<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - AfrikDigitalo</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #FF6B35;
            --secondary: #2E4057;
            --accent-green: #27AE60;
            --light-bg: #F8F9FA;
            --text: #4A5568;
            --white: #FFFFFF;
            --gray-light: #E2E8F0;
            --danger: #E74C3C;
        }
        body {
            font-family: 'Open Sans', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e9ecef 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-container {
            background: var(--white);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
            padding: 40px;
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo i {
            font-size: 3rem;
            color: var(--primary);
        }
        .logo span {
            font-family: 'Montserrat', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            color: var(--secondary);
            display: block;
            margin-top: 10px;
        }
        .logo .highlight { color: var(--primary); }
        h2 {
            text-align: center;
            color: var(--secondary);
            margin-bottom: 30px;
            font-weight: 600;
            font-size: 1.8rem;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--secondary);
        }
        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid var(--gray-light);
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }
        input:focus {
            outline: none;
            border-color: var(--primary);
        }
        .btn {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn:hover {
            background: #e55a2b;
        }
        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .links {
            text-align: center;
            margin-top: 20px;
        }
        .links a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }
        .links a:hover {
            text-decoration: underline;
        }
        .error-message {
            color: var(--danger);
            font-size: 0.9rem;
            margin-top: 5px;
            display: none;
        }
        .info-message {
            background: #e8f4fd;
            border-left: 4px solid #3498DB;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .resend-btn {
            background: transparent;
            border: 1px solid #3498DB;
            color: #3498DB;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.8rem;
            margin-left: 10px;
        }
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: white;
            border-left: 4px solid var(--primary);
            border-radius: 5px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            padding: 15px 25px;
            z-index: 9999;
            display: flex;
            align-items: center;
            gap: 10px;
            transform: translateX(400px);
            transition: transform 0.3s;
        }
        .toast.show {
            transform: translateX(0);
        }
        .toast.success { border-left-color: var(--accent-green); }
        .toast.error { border-left-color: var(--danger); }
    </style>
</head>
<body>
    <div id="toast" class="toast"></div>

    <div class="login-container">
        <div class="logo">
            <i class="fas fa-globe-africa"></i>
            <span>Afrik<span class="highlight">Digitalo</span></span>
        </div>
        <h2>Connexion</h2>
        <div class="info-message" id="verifyMessage" style="display: none;">
            <i class="fas fa-envelope"></i> Votre email n'est pas encore vérifié. Veuillez vérifier votre boîte mail.
            <button class="resend-btn" id="resendVerificationBtn">Renvoyer</button>
        </div>
        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="votre@email.com" required>
            </div>
            <div class="form-group">
                <label for="password">Mot de passe</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <div class="error-message" id="errorMsg"></div>
            <button type="submit" class="btn">Se connecter</button>
        </form>
        <div class="links">
            <p><a href="#" id="forgotPassword">Mot de passe oublié ?</a></p>
            <p>Pas encore de compte ? <a href="register.html">Inscrivez-vous</a></p>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAWlhXhkaOei9RzX8hCNcCXnpjWVId_s48",
            authDomain: "madil-be5be.firebaseapp.com",
            projectId: "madil-be5be",
            storageBucket: "madil-be5be.firebasestorage.app",
            messagingSenderId: "2892375937",
            appId: "1:2892375937:web:8d8381c7914cbd328aaa80",
            measurementId: "G-ZKXRFQDG93"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        // Toast
        function showToast(message, type = 'info') {
            const toast = document.getElementById('toast');
            toast.className = `toast ${type} show`;
            if (type === 'success') toast.innerHTML = '<i class="fas fa-check-circle"></i> ' + message;
            else if (type === 'error') toast.innerHTML = '<i class="fas fa-exclamation-circle"></i> ' + message;
            else toast.innerHTML = '<i class="fas fa-info-circle"></i> ' + message;
            setTimeout(() => {
                toast.classList.remove('show');
            }, 5000);
        }

        // Vérifier si l'utilisateur est déjà connecté et vérifié
        auth.onAuthStateChanged(user => {
            if (user) {
                if (user.emailVerified) {
                    window.location.href = 'dashboard.html';
                } else {
                    // Afficher le message de vérification
                    document.getElementById('verifyMessage').style.display = 'flex';
                }
            }
        });

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');
            errorMsg.style.display = 'none';
            const submitBtn = document.querySelector('#loginForm button[type="submit"]');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Connexion...';

            try {
                const userCredential = await auth.signInWithEmailAndPassword(email, password);
                const user = userCredential.user;
                if (!user.emailVerified) {
                    // Email non vérifié
                    errorMsg.textContent = 'Veuillez vérifier votre email avant de vous connecter.';
                    errorMsg.style.display = 'block';
                    document.getElementById('verifyMessage').style.display = 'flex';
                    // Stocker l'utilisateur pour renvoi
                    window.currentUser = user;
                } else {
                    // OK, rediriger
                    window.location.href = 'dashboard.html';
                }
            } catch (error) {
                errorMsg.textContent = error.message;
                errorMsg.style.display = 'block';
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Se connecter';
            }
        });

        // Renvoyer l'email de vérification
        document.getElementById('resendVerificationBtn').addEventListener('click', async () => {
            if (auth.currentUser) {
                try {
                    await auth.currentUser.sendEmailVerification();
                    showToast('Email de vérification renvoyé. Vérifiez votre boîte mail.', 'success');
                } catch (error) {
                    showToast(error.message, 'error');
                }
            } else {
                showToast('Aucun utilisateur connecté.', 'error');
            }
        });

        // Mot de passe oublié
        document.getElementById('forgotPassword').addEventListener('click', async (e) => {
            e.preventDefault();
            const email = prompt('Veuillez saisir votre adresse email :');
            if (email) {
                try {
                    await auth.sendPasswordResetEmail(email);
                    showToast('Un email de réinitialisation a été envoyé.', 'success');
                } catch (error) {
                    showToast(error.message, 'error');
                }
            }
        });
    </script>
</body>
</html>
