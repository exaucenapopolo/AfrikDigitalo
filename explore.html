<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Explorer - AfrikDigitalo</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .filters {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
        }
        .filter-group {
            flex: 1;
            min-width: 200px;
        }
        .filter-group select, .filter-group input {
            width: 100%;
            padding: 10px;
            border: 2px solid var(--gray-light);
            border-radius: 10px;
            font-size: 1rem;
        }
        .services-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }
        @media (max-width: 768px) {
            .services-grid {
                grid-template-columns: 1fr;
            }
        }
        .service-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            transition: transform 0.3s;
            position: relative;
        }
        .service-card:hover {
            transform: translateY(-5px);
        }
        .service-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.3s;
        }
        .service-image:hover {
            transform: scale(1.02);
        }
        .service-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 15px;
        }
        .btn {
            padding: 10px 15px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-buy {
            background: linear-gradient(135deg, var(--primary), #FF8A5C);
            color: white;
        }
        .btn-buy:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255,107,53,0.3);
        }
        .btn-info {
            background: linear-gradient(135deg, var(--accent-blue), #5FA8D3);
            color: white;
        }
        .btn-info:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(52,152,219,0.3);
        }
        .btn-warning {
            background: linear-gradient(135deg, var(--warning), #F5B041);
            color: white;
        }
        .btn-warning:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(243,156,18,0.3);
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--accent-green), #2ECC71);
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(39,174,96,0.3);
        }
        .modal-image {
            max-width: 100%;
            max-height: 80vh;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <header class="main-header">
        <div class="logo">
            <img src="https://raw.githubusercontent.com/exaucenapopolo/AfrikDigitalo/refs/heads/main/Photo/ezgif-693a681e148aad8a.gif" alt="AfrikDigitalo" style="height: 40px;">
            <span>Afrik<span class="highlight">Digitalo</span></span>
        </div>
        <div class="header-user">
            <button class="header-icon-btn" onclick="location.href='settings.html'"><i class="fas fa-cog"></i></button>
            <img id="headerAvatar" src="https://randomuser.me/api/portraits/lego/1.jpg" alt="Avatar" onclick="location.href='profile.html'">
        </div>
    </header>

    <div class="dashboard">
        <main class="main-content" id="mainContent">
            <div id="verificationBanner" class="verification-banner" style="display: none;">
                <p><i class="fas fa-exclamation-triangle"></i> Votre adresse email n'est pas encore vérifiée.</p>
                <button id="resendVerificationBtn">Renvoyer l'email</button>
            </div>

            <h2>Explorez les services</h2>

            <div class="filters">
                <div class="filter-group">
                    <select id="categoryFilter">
                        <option value="">Toutes catégories</option>
                    </select>
                </div>
                <div class="filter-group">
                    <select id="sortFilter">
                        <option value="recent">Plus récents</option>
                        <option value="oldest">Plus anciens</option>
                        <option value="priceAsc">Prix croissant</option>
                        <option value="priceDesc">Prix décroissant</option>
                        <option value="popular">Plus populaires</option>
                    </select>
                </div>
                <div class="filter-group">
                    <input type="text" id="searchFilter" placeholder="Rechercher...">
                </div>
            </div>

            <div id="exploreList" class="services-grid">Chargement...</div>
        </main>
    </div>

    <nav class="mobile-nav" id="mobileNav">
        <ul id="mobileNavList"></ul>
    </nav>

    <!-- Modal pour afficher les détails d'un service -->
    <div class="modal" id="serviceDetailModal">
        <div class="modal-content" style="max-width: 800px;">
            <span class="modal-close" onclick="closeServiceModal()">&times;</span>
            <div id="serviceDetailContent"></div>
        </div>
    </div>

    <!-- Modal pour afficher une image en grand -->
    <div class="modal" id="imageModal">
        <div class="modal-content" style="background: transparent; box-shadow: none; max-width: 90%;">
            <span class="modal-close" onclick="closeImageModal()" style="color: white;">&times;</span>
            <img id="fullImage" class="modal-image" src="">
        </div>
    </div>

    <div class="modal" id="logoutModal">
        <div class="modal-content">
            <span class="modal-close" onclick="closeLogoutModal()">&times;</span>
            <h3>Confirmation</h3>
            <p>Êtes-vous sûr de vouloir vous déconnecter ?</p>
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button class="btn btn-primary" id="confirmLogout">Oui</button>
                <button class="btn btn-secondary" onclick="closeLogoutModal()">Non</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="auth.js"></script>
    <script>
        let allServices = [];
        let categories = [];

        document.addEventListener('DOMContentLoaded', async () => {
            await requireAuth();
            if (!userData) return;

            if (userData.role !== 'buyer') {
                window.location.href = 'dashboard.html';
                return;
            }

            const sections = [
                { id: 'dashboard', url: 'dashboard.html', icon: 'fas fa-home', label: 'Accueil' },
                { id: 'explore', url: 'explore.html', icon: 'fas fa-search', label: 'Explorer' },
                { id: 'cart', url: 'cart.html', icon: 'fas fa-shopping-cart', label: 'Panier' },
                { id: 'orders', url: 'orders.html', icon: 'fas fa-history', label: 'Achats' },
                { id: 'favorites', url: 'favorites.html', icon: 'fas fa-heart', label: 'Favoris' }
            ];
            document.getElementById('mobileNavList').innerHTML = sections.map(s => `
                <li><a href="${s.url}" class="${s.id === 'explore' ? 'active' : ''}"><i class="${s.icon}"></i> <span>${s.label}</span></a></li>
            `).join('');

            await loadServices();
            setupFilters();
        });

        async function loadServices() {
            const snapshot = await db.collection('services').get();
            allServices = [];
            categories = new Set();
            for (const doc of snapshot.docs) {
                const s = doc.data();
                s.id = doc.id;
                allServices.push(s);
                if (s.category) categories.add(s.category);
            }
            // Remplir le filtre catégorie
            const catSelect = document.getElementById('categoryFilter');
            catSelect.innerHTML = '<option value="">Toutes catégories</option>' + 
                Array.from(categories).map(c => `<option value="${c}">${c}</option>`).join('');
            applyFilters();
        }

        function setupFilters() {
            document.getElementById('categoryFilter').addEventListener('change', applyFilters);
            document.getElementById('sortFilter').addEventListener('change', applyFilters);
            document.getElementById('searchFilter').addEventListener('input', applyFilters);
        }

        function applyFilters() {
            const category = document.getElementById('categoryFilter').value;
            const sort = document.getElementById('sortFilter').value;
            const search = document.getElementById('searchFilter').value.toLowerCase();

            let filtered = allServices.filter(s => {
                if (category && s.category !== category) return false;
                if (search && !s.title.toLowerCase().includes(search) && !s.description.toLowerCase().includes(search)) return false;
                return true;
            });

            // Tri
            if (sort === 'recent') {
                filtered.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));
            } else if (sort === 'oldest') {
                filtered.sort((a, b) => (a.createdAt?.seconds || 0) - (b.createdAt?.seconds || 0));
            } else if (sort === 'priceAsc') {
                filtered.sort((a, b) => a.price - b.price);
            } else if (sort === 'priceDesc') {
                filtered.sort((a, b) => b.price - a.price);
            } else if (sort === 'popular') {
                // On trie par nombre de commandes (à implémenter plus tard)
            }

            displayServices(filtered);
        }

        async function displayServices(services) {
            const listDiv = document.getElementById('exploreList');
            if (services.length === 0) {
                listDiv.innerHTML = '<p>Aucun service trouvé.</p>';
                return;
            }

            let html = '';
            for (const s of services) {
                const creatorDoc = await db.collection('users').doc(s.creatorId).get();
                const creator = creatorDoc.data();
                const creatorName = creator ? creator.name : 'Inconnu';
                const creatorAvatar = creator ? (creator.photoURL || 'https://randomuser.me/api/portraits/lego/1.jpg') : 'https://randomuser.me/api/portraits/lego/1.jpg';
                
                // Compter les commandes pour ce service
                const orderSnap = await db.collection('orders').where('serviceId', '==', s.id).get();
                const orderCount = orderSnap.size;

                const imageHtml = s.images && s.images.length > 0 ? 
                    `<img src="${s.images[0]}" class="service-image" onclick="showImage('${s.images[0]}')">` : '';

                html += `
                    <div class="service-card">
                        ${imageHtml}
                        <h3>${s.title}</h3>
                        <p>${s.description.substring(0, 100)}... <button class="btn-link" onclick="showServiceDetails('${s.id}')">Voir plus</button></p>
                        <div style="display:flex; align-items:center; gap:10px; margin:10px 0;">
                            <img src="${creatorAvatar}" style="width:30px; height:30px; border-radius:50%; object-fit:cover; cursor:pointer;" onclick="location.href='vendor-profile.html?id=${s.creatorId}'">
                            <a href="vendor-profile.html?id=${s.creatorId}" style="color: var(--primary);">${creatorName}</a>
                        </div>
                        <div><i class="fas fa-shopping-bag"></i> ${orderCount} vendus</div>
                        <div class="service-price">${s.price} FCFA</div>
                        <div class="service-actions">
                            <button class="btn btn-buy" onclick="addToCart('${s.id}')"><i class="fas fa-cart-plus"></i> Ajouter</button>
                            <button class="btn btn-info" onclick="contactCreator('${s.creatorId}')"><i class="fas fa-envelope"></i> Contacter</button>
                            <button class="btn btn-warning" onclick="addToFavorites('${s.id}')"><i class="fas fa-heart"></i> Favori</button>
                            <button class="btn btn-primary" onclick="followCreator('${s.creatorId}')"><i class="fas fa-user-plus"></i> Suivre</button>
                        </div>
                    </div>
                `;
            }
            listDiv.innerHTML = html;
        }

        window.showServiceDetails = async function(serviceId) {
            const doc = await db.collection('services').doc(serviceId).get();
            if (!doc.exists) return;
            const s = doc.data();
            const creatorDoc = await db.collection('users').doc(s.creatorId).get();
            const creator = creatorDoc.data();

            let imagesHtml = '';
            if (s.images && s.images.length) {
                imagesHtml = '<div style="display:flex; gap:10px; flex-wrap:wrap; margin-bottom:15px;">';
                s.images.forEach(url => {
                    imagesHtml += `<img src="${url}" style="width:200px; height:150px; object-fit:cover; border-radius:10px; cursor:pointer;" onclick="showImage('${url}')">`;
                });
                imagesHtml += '</div>';
            }

            let faqHtml = '';
            if (s.faq && s.faq.length) {
                faqHtml = '<h4>Questions fréquentes</h4>';
                s.faq.forEach((item, index) => {
                    faqHtml += `
                        <div style="margin-bottom:10px; border-bottom:1px solid #eee; padding-bottom:5px;">
                            <strong>Q: ${item.question}</strong><br>
                            <span>R: ${item.answer}</span>
                        </div>
                    `;
                });
            }

            const modalContent = document.getElementById('serviceDetailContent');
            modalContent.innerHTML = `
                <h3>${s.title}</h3>
                ${imagesHtml}
                <p><strong>Description:</strong> ${s.description}</p>
                <p><strong>Prix:</strong> ${s.price} FCFA</p>
                <p><strong>Catégorie:</strong> ${s.category}</p>
                <p><strong>Délai de livraison:</strong> ${s.deliveryDays} jours</p>
                <p><strong>Vendeur:</strong> <a href="vendor-profile.html?id=${s.creatorId}" style="color: var(--primary);">${creator ? creator.name : 'Inconnu'}</a></p>
                ${faqHtml}
                <div style="margin-top:20px; display:flex; gap:10px;">
                    <button class="btn btn-buy" onclick="addToCart('${serviceId}')">Ajouter au panier</button>
                    <button class="btn btn-warning" onclick="addToFavorites('${serviceId}')">Ajouter aux favoris</button>
                </div>
            `;
            document.getElementById('serviceDetailModal').classList.add('active');
        };

        window.closeServiceModal = function() {
            document.getElementById('serviceDetailModal').classList.remove('active');
        };

        window.showImage = function(url) {
            document.getElementById('fullImage').src = url;
            document.getElementById('imageModal').classList.add('active');
        };

        window.closeImageModal = function() {
            document.getElementById('imageModal').classList.remove('active');
        };

        window.addToCart = async function(serviceId) {
            const existing = await db.collection('cart').where('userId', '==', currentUser.uid).where('serviceId', '==', serviceId).get();
            if (!existing.empty) {
                showToast('Déjà dans le panier', 'info');
                return;
            }
            await db.collection('cart').add({
                userId: currentUser.uid,
                serviceId: serviceId,
                quantity: 1,
                addedAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            showToast('Ajouté au panier', 'success');
        };

        window.addToFavorites = async function(serviceId) {
            const existing = await db.collection('favorites').where('userId', '==', currentUser.uid).where('serviceId', '==', serviceId).get();
            if (!existing.empty) {
                showToast('Déjà dans les favoris', 'info');
                return;
            }
            await db.collection('favorites').add({
                userId: currentUser.uid,
                serviceId: serviceId,
                addedAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            showToast('Ajouté aux favoris', 'success');
        };

        window.followCreator = async function(creatorId) {
            const existing = await db.collection('follows').where('followerId', '==', currentUser.uid).where('followingId', '==', creatorId).get();
            if (!existing.empty) {
                showToast('Vous suivez déjà ce créateur', 'info');
                return;
            }
            await db.collection('follows').add({
                followerId: currentUser.uid,
                followingId: creatorId,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            showToast('Vous suivez maintenant ce créateur', 'success');
        };

        window.contactCreator = function(creatorId) {
            showToast('Fonctionnalité de messagerie à venir', 'info');
        };
    </script>
</body>
</html>
