<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Explorer - AfrikDigitalo</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="main-header">
        <div class="logo">
            <img src="https://raw.githubusercontent.com/exaucenapopolo/AfrikDigitalo/refs/heads/main/Photo/ezgif-693a681e148aad8a.gif" alt="AfrikDigitalo">
            <span>Afrik<span class="highlight">Digitalo</span></span>
        </div>
        <div class="header-user">
            <span id="headerUserName">Utilisateur</span>
            <img id="headerAvatar" src="https://randomuser.me/api/portraits/lego/1.jpg" alt="Avatar">
            <button class="btn-logout" id="logoutBtn"><i class="fas fa-sign-out-alt"></i></button>
        </div>
    </header>

    <div class="dashboard">
        <aside class="sidebar" id="sidebar">
            <nav>
                <ul id="sidebarNav"></ul>
            </nav>
        </aside>

        <main class="main-content" id="mainContent">
            <div id="verificationBanner" class="verification-banner" style="display: none;">
                <p><i class="fas fa-exclamation-triangle"></i> Votre adresse email n'est pas encore vérifiée.</p>
                <button id="resendVerificationBtn">Renvoyer l'email</button>
            </div>

            <h2>Explorez les services</h2>
            <div class="filters">
                <select id="categoryFilter">
                    <option value="">Toutes les catégories</option>
                </select>
                <select id="sortFilter">
                    <option value="recent">Plus récents</option>
                    <option value="old">Plus anciens</option>
                    <option value="priceAsc">Prix croissant</option>
                    <option value="priceDesc">Prix décroissant</option>
                </select>
                <button onclick="applyFilters()">Filtrer</button>
            </div>
            <div id="exploreList" class="services-grid">Chargement...</div>
        </main>
    </div>

    <nav class="mobile-nav" id="mobileNav">
        <ul id="mobileNavList"></ul>
    </nav>

    <!-- Modal pour afficher les détails d'un service -->
    <div class="modal" id="serviceDetailModal">
        <div class="modal-content" style="max-width: 700px;">
            <span class="modal-close" onclick="closeServiceModal()">&times;</span>
            <div id="serviceDetailContent"></div>
        </div>
    </div>

    <!-- Modal de confirmation -->
    <div class="modal" id="confirmModal">
        <div class="modal-content">
            <h3>Confirmation</h3>
            <p id="confirmMessage">Êtes-vous sûr ?</p>
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button class="btn btn-primary" id="confirmYes">Oui</button>
                <button class="btn btn-secondary" onclick="closeConfirmModal()">Non</button>
            </div>
        </div>
    </div>

    <div class="modal" id="logoutModal">
        <div class="modal-content">
            <span class="modal-close" onclick="closeLogoutModal()">&times;</span>
            <h3>Confirmation</h3>
            <p>Êtes-vous sûr de vouloir vous déconnecter ?</p>
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button class="btn btn-primary" id="confirmLogout">Oui</button>
                <button class="btn btn-secondary" onclick="closeLogoutModal()">Non</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="auth.js"></script>
    <script>
        let allServices = [];
        let categories = [];

        document.addEventListener('DOMContentLoaded', async () => {
            await requireAuth();
            if (!userData) return;

            if (userData.role !== 'buyer') {
                window.location.href = 'dashboard.html';
                return;
            }

            const sections = [
                { id: 'dashboard', url: 'dashboard.html', icon: 'fas fa-home', label: 'Accueil' },
                { id: 'explore', url: 'explore.html', icon: 'fas fa-search', label: 'Explorer' },
                { id: 'cart', url: 'cart.html', icon: 'fas fa-shopping-cart', label: 'Panier' },
                { id: 'orders', url: 'orders.html', icon: 'fas fa-history', label: 'Mes achats' },
                { id: 'favorites', url: 'favorites.html', icon: 'fas fa-heart', label: 'Favoris' },
                { id: 'profile', url: 'profile.html', icon: 'fas fa-user', label: 'Profil' },
                { id: 'settings', url: 'settings.html', icon: 'fas fa-cog', label: 'Paramètres' }
            ];
            document.getElementById('sidebarNav').innerHTML = sections.map(s => `
                <li><a href="${s.url}" class="${s.id === 'explore' ? 'active' : ''}"><i class="${s.icon}"></i> ${s.label}</a></li>
            `).join('');
            document.getElementById('mobileNavList').innerHTML = sections.map(s => `
                <li><a href="${s.url}" class="${s.id === 'explore' ? 'active' : ''}"><i class="${s.icon}"></i> <span>${s.label}</span></a></li>
            `).join('');

            await loadServices();
        });

        async function loadServices() {
            const snapshot = await db.collection('services').get();
            allServices = [];
            categories = new Set();
            for (const doc of snapshot.docs) {
                const s = doc.data();
                s.id = doc.id;
                allServices.push(s);
                if (s.category) categories.add(s.category);
            }
            // Remplir le filtre catégorie
            const catSelect = document.getElementById('categoryFilter');
            catSelect.innerHTML = '<option value="">Toutes les catégories</option>' + 
                Array.from(categories).sort().map(c => `<option value="${c}">${c}</option>`).join('');
            applyFilters();
        }

        async function applyFilters() {
            const category = document.getElementById('categoryFilter').value;
            const sort = document.getElementById('sortFilter').value;
            let filtered = allServices;
            if (category) {
                filtered = filtered.filter(s => s.category === category);
            }
            // Trier
            if (sort === 'recent') {
                filtered.sort((a, b) => (b.createdAt?.toDate() || 0) - (a.createdAt?.toDate() || 0));
            } else if (sort === 'old') {
                filtered.sort((a, b) => (a.createdAt?.toDate() || 0) - (b.createdAt?.toDate() || 0));
            } else if (sort === 'priceAsc') {
                filtered.sort((a, b) => a.price - b.price);
            } else if (sort === 'priceDesc') {
                filtered.sort((a, b) => b.price - a.price);
            }
            await displayServices(filtered);
        }

        async function displayServices(services) {
            const listDiv = document.getElementById('exploreList');
            if (services.length === 0) {
                listDiv.innerHTML = '<p>Aucun service trouvé.</p>';
                return;
            }
            let html = '';
            for (const s of services) {
                const creatorDoc = await db.collection('users').doc(s.creatorId).get();
                const creator = creatorDoc.data();
                const creatorName = creator ? creator.name : 'Inconnu';
                const creatorAvatar = creator ? (creator.photoURL || 'https://randomuser.me/api/portraits/lego/1.jpg') : 'https://randomuser.me/api/portraits/lego/1.jpg';
                const cartCountSnap = await db.collection('cart').where('serviceId', '==', s.id).get();
                const cartCount = cartCountSnap.size;
                const orderCountSnap = await db.collection('orders').where('serviceId', '==', s.id).get();
                const orderCount = orderCountSnap.size;

                const imageHtml = s.images && s.images.length > 0 ? `<img src="${s.images[0]}" alt="${s.title}" onclick="showServiceDetails('${s.id}')">` : '';

                html += `
                    <div class="service-card">
                        ${imageHtml}
                        <h3>${s.title}</h3>
                        <p>${s.description.substring(0, 80)}... <button class="btn-link" onclick="showServiceDetails('${s.id}')">Voir plus</button></p>
                        <div style="display:flex; align-items:center; gap:10px; margin-bottom:10px;">
                            <img src="${creatorAvatar}" style="width:30px; height:30px; border-radius:50%; object-fit:cover;">
                            <a href="vendor-profile.html?id=${s.creatorId}" style="color: var(--primary);">${creatorName}</a>
                        </div>
                        <div><i class="fas fa-cart-plus"></i> ${cartCount} dans paniers</div>
                        <div><i class="fas fa-shopping-bag"></i> ${orderCount} vendus</div>
                        <div class="service-price">${s.price} FCFA</div>
                        <div class="service-actions">
                            <button class="btn-buy" onclick="addToCart('${s.id}')"><i class="fas fa-cart-plus"></i> Ajouter</button>
                            <button class="btn-info" onclick="contactCreator('${s.creatorId}')"><i class="fas fa-envelope"></i> Contacter</button>
                            <button class="btn-warning" onclick="addToFavorites('${s.id}')"><i class="fas fa-heart"></i> Favori</button>
                            <button class="btn-primary" onclick="followCreator('${s.creatorId}')"><i class="fas fa-user-plus"></i> Suivre</button>
                        </div>
                    </div>
                `;
            }
            listDiv.innerHTML = html;
        }

        // Les fonctions showServiceDetails, addToCart, etc. restent similaires avec animation et confirmation
        window.showServiceDetails = async function(serviceId) {
            const doc = await db.collection('services').doc(serviceId).get();
            if (!doc.exists) return;
            const s = doc.data();
            const creatorDoc = await db.collection('users').doc(s.creatorId).get();
            const creator = creatorDoc.data();

            let imagesHtml = '';
            if (s.images && s.images.length) {
                imagesHtml = '<div style="display:flex; gap:10px; flex-wrap:wrap; margin-bottom:15px;">';
                s.images.forEach(url => {
                    imagesHtml += `<img src="${url}" style="width:200px; height:150px; object-fit:cover; border-radius:5px; cursor:pointer;" onclick="window.open('${url}')">`;
                });
                imagesHtml += '</div>';
            }

            let faqHtml = '';
            if (s.faq && s.faq.length) {
                faqHtml = '<h4>Questions fréquentes</h4>';
                s.faq.forEach((item, index) => {
                    faqHtml += `
                        <div style="margin-bottom:10px; border-bottom:1px solid #eee; padding-bottom:5px;">
                            <strong>Q: ${item.question}</strong><br>
                            <span>R: ${item.answer}</span>
                        </div>
                    `;
                });
            }

            const modalContent = document.getElementById('serviceDetailContent');
            modalContent.innerHTML = `
                <h3>${s.title}</h3>
                ${imagesHtml}
                <p><strong>Description:</strong> ${s.description}</p>
                <p><strong>Prix:</strong> ${s.price} FCFA</p>
                <p><strong>Catégorie:</strong> ${s.category}</p>
                <p><strong>Délai de livraison:</strong> ${s.deliveryDays} jours</p>
                <p><strong>Vendeur:</strong> <a href="vendor-profile.html?id=${s.creatorId}" style="color: var(--primary);">${creator ? creator.name : 'Inconnu'}</a></p>
                ${faqHtml}
                <div style="margin-top:20px; display:flex; gap:10px;">
                    <button class="btn-buy" onclick="addToCart('${serviceId}')">Ajouter au panier</button>
                    <button class="btn-warning" onclick="addToFavorites('${serviceId}')">Ajouter aux favoris</button>
                </div>
            `;
            document.getElementById('serviceDetailModal').classList.add('active');
        };

        window.closeServiceModal = function() {
            document.getElementById('serviceDetailModal').classList.remove('active');
        };

        window.addToCart = async function(serviceId) {
            const existing = await db.collection('cart').where('userId', '==', currentUser.uid).where('serviceId', '==', serviceId).get();
            if (!existing.empty) {
                showToast('Déjà dans le panier', 'info');
                return;
            }
            await db.collection('cart').add({
                userId: currentUser.uid,
                serviceId: serviceId,
                quantity: 1,
                addedAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            showToast('Ajouté au panier', 'success');
        };

        window.addToFavorites = async function(serviceId) {
            const existing = await db.collection('favorites').where('userId', '==', currentUser.uid).where('serviceId', '==', serviceId).get();
            if (!existing.empty) {
                showToast('Déjà dans les favoris', 'info');
                return;
            }
            await db.collection('favorites').add({
                userId: currentUser.uid,
                serviceId: serviceId,
                addedAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            showToast('Ajouté aux favoris', 'success');
        };

        window.followCreator = async function(creatorId) {
            const existing = await db.collection('follows').where('followerId', '==', currentUser.uid).where('followingId', '==', creatorId).get();
            if (!existing.empty) {
                showToast('Vous suivez déjà ce créateur', 'info');
                return;
            }
            await db.collection('follows').add({
                followerId: currentUser.uid,
                followingId: creatorId,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            showToast('Vous suivez maintenant ce créateur', 'success');
        };

        window.contactCreator = function(creatorId) {
            showToast('Fonctionnalité de messagerie à venir', 'info');
        };

        // Modal de confirmation (similaire)
        let confirmCallback = null;
        window.showConfirm = function(message, callback) {
            document.getElementById('confirmMessage').textContent = message;
            confirmCallback = callback;
            document.getElementById('confirmModal').classList.add('active');
        };
        window.closeConfirmModal = function() {
            document.getElementById('confirmModal').classList.remove('active');
            confirmCallback = null;
        };
        document.getElementById('confirmYes').addEventListener('click', () => {
            if (confirmCallback) {
                confirmCallback();
            }
            closeConfirmModal();
        });
    </script>
</body>
</html>
