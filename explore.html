<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Explorer - AfrikDigitalo</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .filter-bar {
            background: white;
            border-radius: 10px;
            padding: 15px 20px;
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
            box-shadow: var(--shadow-sm);
        }
        .filter-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .filter-group label {
            font-weight: 600;
            color: var(--secondary);
        }
        .filter-group select, .filter-group input {
            padding: 8px 12px;
            border: 1px solid var(--gray-light);
            border-radius: 5px;
        }
        .filter-group button {
            padding: 8px 20px;
        }
        .explore-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }
        @media (max-width: 768px) {
            .explore-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header class="main-header">
        <div class="logo">
            <img src="https://raw.githubusercontent.com/exaucenapopolo/AfrikDigitalo/refs/heads/main/Photo/ezgif-693a681e148aad8a.gif" alt="AfrikDigitalo">
            <span>Afrik<span class="highlight">Digitalo</span></span>
        </div>
        <div class="header-user">
            <button class="header-icon-btn" id="settingsBtn" onclick="location.href='settings.html'"><i class="fas fa-cog"></i></button>
            <img id="headerAvatar" src="https://randomuser.me/api/portraits/lego/1.jpg" alt="Avatar" onclick="location.href='profile.html'">
        </div>
    </header>

    <div class="dashboard">
        <aside class="sidebar" id="sidebar">
            <nav><ul id="sidebarNav"></ul></nav>
        </aside>
        <main class="main-content">
            <div id="verificationBanner" class="verification-banner" style="display: none;"></div>

            <h2>Explorer les services</h2>

            <!-- Barre de filtres -->
            <div class="filter-bar">
                <div class="filter-group">
                    <label>Catégorie:</label>
                    <select id="filterCategory">
                        <option value="">Toutes</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>Prix max:</label>
                    <input type="number" id="filterPrice" placeholder="FCFA">
                </div>
                <div class="filter-group">
                    <label>Trier par:</label>
                    <select id="filterSort">
                        <option value="recent">Plus récents</option>
                        <option value="old">Plus anciens</option>
                        <option value="priceAsc">Prix croissant</option>
                        <option value="priceDesc">Prix décroissant</option>
                    </select>
                </div>
                <button class="btn btn-primary" onclick="applyFilters()">Filtrer</button>
            </div>

            <div id="exploreList" class="explore-grid">Chargement...</div>
        </main>
    </div>

    <nav class="mobile-nav" id="mobileNav">
        <ul id="mobileNavList"></ul>
    </nav>

    <!-- Modal détails service -->
    <div class="modal" id="serviceDetailModal">
        <div class="modal-content" style="max-width: 700px;">
            <span class="modal-close" onclick="closeServiceModal()">&times;</span>
            <div id="serviceDetailContent"></div>
        </div>
    </div>

    <div class="modal" id="logoutModal">
        <div class="modal-content">
            <span class="modal-close" onclick="closeLogoutModal()">&times;</span>
            <h3>Confirmation</h3>
            <p>Êtes-vous sûr de vouloir vous déconnecter ?</p>
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button class="btn btn-primary" id="confirmLogout">Oui</button>
                <button class="btn btn-secondary" onclick="closeLogoutModal()">Non</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="auth.js"></script>
    <script>
        let allServices = [];
        let categories = [];

        document.addEventListener('DOMContentLoaded', async () => {
            await requireAuth();
            if (!userData) return;

            if (userData.role !== 'buyer') {
                window.location.href = 'creator-dashboard.html';
                return;
            }

            // Navigation mobile
            const sections = [
                { id: 'dashboard', url: 'dashboard.html', icon: 'fas fa-home', label: 'Accueil' },
                { id: 'explore', url: 'explore.html', icon: 'fas fa-search', label: 'Explorer' },
                { id: 'cart', url: 'cart.html', icon: 'fas fa-shopping-cart', label: 'Panier' },
                { id: 'orders', url: 'orders.html', icon: 'fas fa-history', label: 'Mes achats' },
                { id: 'favorites', url: 'favorites.html', icon: 'fas fa-heart', label: 'Favoris' }
            ];
            document.getElementById('mobileNavList').innerHTML = sections.map(s => `
                <li><a href="${s.url}" class="${s.id === 'explore' ? 'active' : ''}"><i class="${s.icon}"></i> <span>${s.label}</span></a></li>
            `).join('');

            await loadServices();
            populateCategories();
        });

        async function loadServices() {
            const snapshot = await db.collection('services').get();
            allServices = [];
            for (const doc of snapshot.docs) {
                const s = doc.data();
                const creatorDoc = await db.collection('users').doc(s.creatorId).get();
                const creator = creatorDoc.data();
                allServices.push({
                    id: doc.id,
                    ...s,
                    creatorName: creator ? creator.name : 'Inconnu',
                    creatorAvatar: creator ? (creator.photoURL || 'https://randomuser.me/api/portraits/lego/1.jpg') : 'https://randomuser.me/api/portraits/lego/1.jpg'
                });
            }
            applyFilters();
        }

        function populateCategories() {
            const cats = [...new Set(allServices.map(s => s.category))];
            const select = document.getElementById('filterCategory');
            cats.forEach(c => {
                select.innerHTML += `<option value="${c}">${c}</option>`;
            });
        }

        function applyFilters() {
            const cat = document.getElementById('filterCategory').value;
            const priceMax = parseFloat(document.getElementById('filterPrice').value) || Infinity;
            const sort = document.getElementById('filterSort').value;

            let filtered = allServices.filter(s => 
                (cat === '' || s.category === cat) && s.price <= priceMax
            );

            // Tri
            if (sort === 'recent') {
                filtered.sort((a, b) => (b.createdAt?.toDate() || 0) - (a.createdAt?.toDate() || 0));
            } else if (sort === 'old') {
                filtered.sort((a, b) => (a.createdAt?.toDate() || 0) - (b.createdAt?.toDate() || 0));
            } else if (sort === 'priceAsc') {
                filtered.sort((a, b) => a.price - b.price);
            } else if (sort === 'priceDesc') {
                filtered.sort((a, b) => b.price - a.price);
            }

            displayServices(filtered);
        }

        function displayServices(services) {
            const listDiv = document.getElementById('exploreList');
            if (services.length === 0) {
                listDiv.innerHTML = '<p>Aucun service trouvé.</p>';
                return;
            }
            let html = '';
            services.forEach(s => {
                const imageHtml = s.images && s.images.length > 0 ? `<img src="${s.images[0]}" alt="${s.title}" onclick="showImageModal('${s.images[0]}')">` : '';
                html += `
                    <div class="service-card">
                        ${imageHtml}
                        <h3>${s.title}</h3>
                        <p>${s.description.substring(0, 80)}... <button class="btn-link" onclick="showServiceDetails('${s.id}')">Voir plus</button></p>
                        <div style="display:flex; align-items:center; gap:10px; margin-bottom:10px;">
                            <img src="${s.creatorAvatar}" style="width:30px; height:30px; border-radius:50%; object-fit:cover; cursor:pointer;" onclick="location.href='vendor-profile.html?id=${s.creatorId}'">
                            <a href="vendor-profile.html?id=${s.creatorId}" style="color: var(--primary);">${s.creatorName}</a>
                        </div>
                        <div class="service-price">${s.price} FCFA</div>
                        <div class="service-actions">
                            <button class="btn btn-success" onclick="addToCart('${s.id}')"><i class="fas fa-cart-plus"></i> Ajouter</button>
                            <button class="btn btn-info" onclick="contactCreator('${s.creatorId}')"><i class="fas fa-envelope"></i> Contacter</button>
                            <button class="btn btn-warning" onclick="addToFavorites('${s.id}')"><i class="fas fa-heart"></i> Favori</button>
                            <button class="btn btn-primary" onclick="followCreator('${s.creatorId}')"><i class="fas fa-user-plus"></i> Suivre</button>
                        </div>
                    </div>
                `;
            });
            listDiv.innerHTML = html;
        }

        // Fonctions globales
        window.showServiceDetails = async function(serviceId) {
            const doc = await db.collection('services').doc(serviceId).get();
            if (!doc.exists) return;
            const s = doc.data();
            const creatorDoc = await db.collection('users').doc(s.creatorId).get();
            const creator = creatorDoc.data();

            let imagesHtml = '';
            if (s.images && s.images.length) {
                imagesHtml = '<div style="display:flex; gap:10px; flex-wrap:wrap; margin-bottom:15px;">';
                s.images.forEach(url => {
                    imagesHtml += `<img src="${url}" style="width:200px; height:150px; object-fit:cover; border-radius:5px; cursor:pointer;" onclick="showImageModal('${url}')">`;
                });
                imagesHtml += '</div>';
            }

            let faqHtml = '';
            if (s.faq && s.faq.length) {
                faqHtml = '<h4>Questions fréquentes</h4>';
                s.faq.forEach((item, index) => {
                    faqHtml += `
                        <div style="margin-bottom:10px; border-bottom:1px solid #eee; padding-bottom:5px;">
                            <strong>Q: ${item.question}</strong><br>
                            <span>R: ${item.answer}</span>
                        </div>
                    `;
                });
            }

            document.getElementById('serviceDetailContent').innerHTML = `
                <h3>${s.title}</h3>
                ${imagesHtml}
                <p><strong>Description:</strong> ${s.description}</p>
                <p><strong>Prix:</strong> ${s.price} FCFA</p>
                <p><strong>Catégorie:</strong> ${s.category}</p>
                <p><strong>Délai de livraison:</strong> ${s.deliveryDays} jours</p>
                <p><strong>Vendeur:</strong> <a href="vendor-profile.html?id=${s.creatorId}" style="color: var(--primary);">${creator ? creator.name : 'Inconnu'}</a></p>
                ${faqHtml}
                <div style="margin-top:20px; display:flex; gap:10px;">
                    <button class="btn btn-success" onclick="addToCart('${serviceId}')">Ajouter au panier</button>
                    <button class="btn btn-warning" onclick="addToFavorites('${serviceId}')">Ajouter aux favoris</button>
                </div>
            `;
            document.getElementById('serviceDetailModal').classList.add('active');
        };

        window.closeServiceModal = function() {
            document.getElementById('serviceDetailModal').classList.remove('active');
        };

        window.showImageModal = function(url) {
            // On peut ouvrir une modal simple avec l'image en grand
            const modal = document.createElement('div');
            modal.style.position = 'fixed';
            modal.style.top = '0';
            modal.style.left = '0';
            modal.style.width = '100%';
            modal.style.height = '100%';
            modal.style.backgroundColor = 'rgba(0,0,0,0.8)';
            modal.style.zIndex = '3000';
            modal.style.display = 'flex';
            modal.style.justifyContent = 'center';
            modal.style.alignItems = 'center';
            modal.innerHTML = `<img src="${url}" style="max-width:90%; max-height:90%; border-radius:10px;"><span style="position:absolute; top:20px; right:30px; color:white; font-size:40px; cursor:pointer;" onclick="this.parentElement.remove()">&times;</span>`;
            document.body.appendChild(modal);
        };

        window.addToCart = async function(serviceId) {
            const existing = await db.collection('cart').where('userId', '==', currentUser.uid).where('serviceId', '==', serviceId).get();
            if (!existing.empty) {
                showToast('Déjà dans le panier', 'info');
                return;
            }
            await db.collection('cart').add({
                userId: currentUser.uid,
                serviceId: serviceId,
                quantity: 1,
                addedAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            showToast('Ajouté au panier', 'success');
        };

        window.addToFavorites = async function(serviceId) {
            const existing = await db.collection('favorites').where('userId', '==', currentUser.uid).where('serviceId', '==', serviceId).get();
            if (!existing.empty) {
                showToast('Déjà dans les favoris', 'info');
                return;
            }
            await db.collection('favorites').add({
                userId: currentUser.uid,
                serviceId: serviceId,
                addedAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            showToast('Ajouté aux favoris', 'success');
        };

        window.followCreator = async function(creatorId) {
            const existing = await db.collection('follows').where('followerId', '==', currentUser.uid).where('followingId', '==', creatorId).get();
            if (!existing.empty) {
                showToast('Vous suivez déjà ce créateur', 'info');
                return;
            }
            await db.collection('follows').add({
                followerId: currentUser.uid,
                followingId: creatorId,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            showToast('Vous suivez maintenant ce créateur', 'success');
        };

        window.contactCreator = function(creatorId) {
            showToast('Fonctionnalité de messagerie à venir', 'info');
        };
    </script>
</body>
</html>
