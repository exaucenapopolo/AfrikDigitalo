<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Retirer mes gains - AfrikDigitalo</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .withdraw-container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: var(--shadow-md);
        }
    </style>
</head>
<body>
    <header class="main-header">
        <div class="logo">
            <img src="https://raw.githubusercontent.com/exaucenapopolo/AfrikDigitalo/refs/heads/main/Photo/ezgif-693a681e148aad8a.gif" alt="AfrikDigitalo">
            <span>Afrik<span class="highlight">Digitalo</span></span>
        </div>
        <div class="header-user">
            <button class="header-icon-btn" onclick="location.href='settings.html'"><i class="fas fa-cog"></i></button>
            <img id="headerAvatar" src="https://randomuser.me/api/portraits/lego/1.jpg" alt="Avatar" onclick="location.href='profile.html'">
        </div>
    </header>

    <div class="dashboard">
        <aside class="sidebar"></aside>
        <main class="main-content">
            <div class="withdraw-container">
                <h2>Retirer mes gains</h2>
                <p>Solde disponible: <strong id="currentBalance">0 FCFA</strong></p>

                <form id="withdrawForm">
                    <div class="form-group">
                        <label>Montant à retirer (FCFA)</label>
                        <input type="number" id="amount" min="1000" step="1000" required>
                    </div>

                    <div class="form-group">
                        <label>Méthode de retrait</label>
                        <select id="method" required>
                            <option value="">Choisissez</option>
                            <option value="om">Orange Money</option>
                            <option value="momo">MTN MoMo</option>
                            <option value="bank">Virement bancaire</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Numéro de téléphone / RIB</label>
                        <input type="text" id="account" required>
                    </div>

                    <button type="submit" class="btn-save">Demander le retrait</button>
                </form>

                <p style="text-align:center; margin-top:20px; color:#777;">Simulation: Le retrait sera traité sous 24h</p>
            </div>
        </main>
    </div>

    <nav class="mobile-nav" id="mobileNav">
        <ul id="mobileNavList"></ul>
    </nav>

    <div id="toast" class="toast"></div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            await requireAuth();
            if (!userData) return;

            document.getElementById('currentBalance').textContent = (userData.balance || 0) + ' FCFA';

            const sections = userData.role === 'creator' ? [
                { id: 'dashboard', url: 'creator-dashboard.html', icon: 'fas fa-home', label: 'Accueil' },
                { id: 'services', url: 'services.html', icon: 'fas fa-list', label: 'Services' },
                { id: 'orders', url: 'creator-orders.html', icon: 'fas fa-shopping-bag', label: 'Commandes' },
                { id: 'followers', url: 'followers.html', icon: 'fas fa-users', label: 'Abonnés' }
            ] : [
                { id: 'dashboard', url: 'dashboard.html', icon: 'fas fa-home', label: 'Accueil' },
                { id: 'explore', url: 'explore.html', icon: 'fas fa-search', label: 'Explorer' },
                { id: 'cart', url: 'cart.html', icon: 'fas fa-shopping-cart', label: 'Panier' },
                { id: 'orders', url: 'orders.html', icon: 'fas fa-history', label: 'Achats' },
                { id: 'favorites', url: 'favorites.html', icon: 'fas fa-heart', label: 'Favoris' }
            ];
            document.getElementById('mobileNavList').innerHTML = sections.map(s => `
                <li><a href="${s.url}" class=""><i class="${s.icon}"></i> <span>${s.label}</span></a></li>
            `).join('');
        });

        document.getElementById('withdrawForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const amount = parseFloat(document.getElementById('amount').value);
            const method = document.getElementById('method').value;
            const account = document.getElementById('account').value;

            if (!amount || !method || !account) {
                showToast('Veuillez remplir tous les champs', 'error');
                return;
            }

            if (amount > (userData.balance || 0)) {
                showToast('Solde insuffisant', 'error');
                return;
            }

            showToast('Demande de retrait en cours...', 'info');
            setTimeout(async () => {
                // Simuler le retrait
                const userRef = db.collection('users').doc(currentUser.uid);
                await userRef.update({
                    balance: firebase.firestore.FieldValue.increment(-amount)
                });
                userData.balance -= amount;
                showToast(`Demande de retrait de ${amount} FCFA soumise avec succès`, 'success');
                setTimeout(() => {
                    window.location.href = userData.role === 'creator' ? 'creator-dashboard.html' : 'dashboard.html';
                }, 2000);
            }, 2000);
        });
    </script>
</body>
</html>
