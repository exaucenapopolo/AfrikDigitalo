<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Abonnés - AfrikDigitalo</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="main-header">
        <div class="logo">
            <i class="fas fa-globe-africa"></i>
            <span>Afrik<span class="highlight">Digitalo</span></span>
        </div>
        <div class="header-user">
            <span id="headerBalance" style="font-weight:600; margin-right:10px;"></span>
            <span id="headerUserName">Utilisateur</span>
            <img id="headerAvatar" src="https://randomuser.me/api/portraits/lego/1.jpg" alt="Avatar">
            <button class="btn-logout" id="logoutBtn"><i class="fas fa-sign-out-alt"></i></button>
        </div>
    </header>

    <button class="mobile-menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>

    <div class="dashboard">
        <aside class="sidebar" id="sidebar">
            <nav>
                <ul id="sidebarNav"></ul>
            </nav>
        </aside>

        <main class="main-content" id="mainContent">
            <div id="verificationBanner" class="verification-banner" style="display: none;">
                <p><i class="fas fa-exclamation-triangle"></i> Votre adresse email n'est pas encore vérifiée.</p>
                <button id="resendVerificationBtn">Renvoyer l'email</button>
            </div>

            <div id="followersList">Chargement...</div>
        </main>
    </div>

    <nav class="mobile-nav" id="mobileNav">
        <ul id="mobileNavList"></ul>
    </nav>

    <div class="modal" id="logoutModal">
        <div class="modal-content">
            <span class="modal-close" onclick="closeLogoutModal()">&times;</span>
            <h3>Confirmation</h3>
            <p>Êtes-vous sûr de vouloir vous déconnecter ?</p>
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button class="btn btn-primary" id="confirmLogout">Oui</button>
                <button class="btn btn-secondary" onclick="closeLogoutModal()">Non</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            await requireAuth();
            if (!userData) return;

            if (userData.role !== 'creator') {
                window.location.href = 'dashboard.html';
                return;
            }

            const sections = [
                { id: 'dashboard', url: 'dashboard.html', icon: 'fas fa-home', label: 'Accueil' },
                { id: 'services', url: 'services.html', icon: 'fas fa-list', label: 'Mes services' },
                { id: 'orders', url: 'orders.html', icon: 'fas fa-shopping-bag', label: 'Commandes' },
                { id: 'followers', url: 'followers.html', icon: 'fas fa-users', label: 'Abonnés' },
                { id: 'profile', url: 'profile.html', icon: 'fas fa-user', label: 'Profil' },
                { id: 'settings', url: 'settings.html', icon: 'fas fa-cog', label: 'Paramètres' }
            ];
            document.getElementById('sidebarNav').innerHTML = sections.map(s => `
                <li><a href="${s.url}" class="${s.id === 'followers' ? 'active' : ''}"><i class="${s.icon}"></i> ${s.label}</a></li>
            `).join('');
            document.getElementById('mobileNavList').innerHTML = sections.map(s => `
                <li><a href="${s.url}" class="${s.id === 'followers' ? 'active' : ''}"><i class="${s.icon}"></i> <span>${s.label}</span></a></li>
            `).join('');

            await loadFollowers();
        });

        async function loadFollowers() {
            const listDiv = document.getElementById('followersList');
            const followersSnap = await db.collection('follows').where('followingId', '==', currentUser.uid).get();
            if (followersSnap.empty) {
                listDiv.innerHTML = '<p>Vous n\'avez pas encore d\'abonnés.</p>';
                return;
            }
            let html = '<div class="orders-table"><h2>Mes abonnés</h2><table><thead><tr><th>Avatar</th><th>Nom</th><th>Achats</th><th>Favoris</th><th>Depuis</th></tr></thead><tbody>';
            for (const doc of followersSnap.docs) {
                const f = doc.data();
                const userDoc = await db.collection('users').doc(f.followerId).get();
                if (userDoc.exists) {
                    const follower = userDoc.data();
                    const ordersSnap = await db.collection('orders')
                        .where('buyerId', '==', f.followerId)
                        .where('sellerId', '==', currentUser.uid)
                        .get();
                    const ordersCount = ordersSnap.size;
                    const servicesSnap = await db.collection('services').where('creatorId', '==', currentUser.uid).get();
                    let favCount = 0;
                    for (const svc of servicesSnap.docs) {
                        const favSnap = await db.collection('favorites')
                            .where('userId', '==', f.followerId)
                            .where('serviceId', '==', svc.id)
                            .get();
                        favCount += favSnap.size;
                    }
                    const date = f.createdAt ? new Date(f.createdAt.toDate()).toLocaleDateString() : 'N/A';
                    html += `<tr>
                        <td><img src="${follower.photoURL || 'https://randomuser.me/api/portraits/lego/1.jpg'}" style="width:40px; height:40px; border-radius:50%; object-fit:cover;"></td>
                        <td>${follower.name || 'Inconnu'}</td>
                        <td>${ordersCount}</td>
                        <td>${favCount}</td>
                        <td>${date}</td>
                    </tr>`;
                }
            }
            html += '</tbody></table></div>';
            listDiv.innerHTML = html;
        }
    </script>
</body>
</html>
