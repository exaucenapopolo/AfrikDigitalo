<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Panier - AfrikDigitalo</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="main-header">
        <div class="logo">
            <img src="https://raw.githubusercontent.com/exaucenapopolo/AfrikDigitalo/refs/heads/main/Photo/ezgif-693a681e148aad8a.gif" alt="AfrikDigitalo">
            <span>Afrik<span class="highlight">Digitalo</span></span>
        </div>
        <div class="header-user">
            <span id="headerUserName">Utilisateur</span>
            <img id="headerAvatar" src="https://randomuser.me/api/portraits/lego/1.jpg" alt="Avatar">
            <button class="btn-logout" id="logoutBtn"><i class="fas fa-sign-out-alt"></i></button>
        </div>
    </header>

    <div class="dashboard">
        <aside class="sidebar" id="sidebar">
            <nav>
                <ul id="sidebarNav"></ul>
            </nav>
        </aside>

        <main class="main-content" id="mainContent">
            <div id="verificationBanner" class="verification-banner" style="display: none;">
                <p><i class="fas fa-exclamation-triangle"></i> Votre adresse email n'est pas encore vérifiée.</p>
                <button id="resendVerificationBtn">Renvoyer l'email</button>
            </div>

            <div id="cartContent">Chargement...</div>
        </main>
    </div>

    <nav class="mobile-nav" id="mobileNav">
        <ul id="mobileNavList"></ul>
    </nav>

    <!-- Modal de confirmation -->
    <div class="modal" id="confirmModal">
        <div class="modal-content">
            <h3>Confirmation</h3>
            <p id="confirmMessage">Êtes-vous sûr ?</p>
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button class="btn btn-primary" id="confirmYes">Oui</button>
                <button class="btn btn-secondary" onclick="closeConfirmModal()">Non</button>
            </div>
        </div>
    </div>

    <div class="modal" id="logoutModal">
        <div class="modal-content">
            <span class="modal-close" onclick="closeLogoutModal()">&times;</span>
            <h3>Confirmation</h3>
            <p>Êtes-vous sûr de vouloir vous déconnecter ?</p>
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button class="btn btn-primary" id="confirmLogout">Oui</button>
                <button class="btn btn-secondary" onclick="closeLogoutModal()">Non</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="auth.js"></script>
    <script>
        let confirmCallback = null;

        document.addEventListener('DOMContentLoaded', async () => {
            await requireAuth();
            if (!userData) return;

            if (userData.role !== 'buyer') {
                window.location.href = 'dashboard.html';
                return;
            }

            const sections = [
                { id: 'dashboard', url: 'dashboard.html', icon: 'fas fa-home', label: 'Accueil' },
                { id: 'explore', url: 'explore.html', icon: 'fas fa-search', label: 'Explorer' },
                { id: 'cart', url: 'cart.html', icon: 'fas fa-shopping-cart', label: 'Panier' },
                { id: 'orders', url: 'orders.html', icon: 'fas fa-history', label: 'Mes achats' },
                { id: 'favorites', url: 'favorites.html', icon: 'fas fa-heart', label: 'Favoris' },
                { id: 'profile', url: 'profile.html', icon: 'fas fa-user', label: 'Profil' },
                { id: 'settings', url: 'settings.html', icon: 'fas fa-cog', label: 'Paramètres' }
            ];
            document.getElementById('sidebarNav').innerHTML = sections.map(s => `
                <li><a href="${s.url}" class="${s.id === 'cart' ? 'active' : ''}"><i class="${s.icon}"></i> ${s.label}</a></li>
            `).join('');
            document.getElementById('mobileNavList').innerHTML = sections.map(s => `
                <li><a href="${s.url}" class="${s.id === 'cart' ? 'active' : ''}"><i class="${s.icon}"></i> <span>${s.label}</span></a></li>
            `).join('');

            await loadCart();
        });

        async function loadCart() {
            const contentDiv = document.getElementById('cartContent');
            const cartSnap = await db.collection('cart').where('userId', '==', currentUser.uid).get();
            if (cartSnap.empty) {
                contentDiv.innerHTML = '<p>Votre panier est vide.</p>';
                return;
            }

            let total = 0;
            let items = [];
            for (const doc of cartSnap.docs) {
                const item = doc.data();
                const serviceDoc = await db.collection('services').doc(item.serviceId).get();
                if (serviceDoc.exists) {
                    const s = serviceDoc.data();
                    items.push({ 
                        id: doc.id, 
                        serviceId: item.serviceId, 
                        title: s.title, 
                        price: s.price, 
                        quantity: item.quantity || 1,
                        images: s.images || []
                    });
                    total += s.price * (item.quantity || 1);
                }
            }

            let html = '<div class="orders-table"><h2>Votre panier</h2><table><thead><tr><th>Service</th><th>Prix unitaire</th><th>Quantité</th><th>Total</th><th>Action</th></tr></thead><tbody>';
            items.forEach(item => {
                const imageHtml = item.images.length > 0 ? `<img src="${item.images[0]}" style="width:50px; height:50px; object-fit:cover; border-radius:5px; margin-right:10px; cursor:pointer;" onclick="window.open('${item.images[0]}')">` : '';
                html += `<tr>
                    <td>${imageHtml} ${item.title}</td>
                    <td>${item.price} FCFA</td>
                    <td><input type="number" min="1" value="${item.quantity}" style="width:60px;" onchange="updateQuantity('${item.id}', this.value)"></td>
                    <td>${item.price * item.quantity} FCFA</td>
                    <td><button class="btn-delete" onclick="confirmRemoveFromCart('${item.id}')"><i class="fas fa-trash"></i></button></td>
                </tr>`;
            });
            html += `</tbody></table><p><strong>Total : ${total} FCFA</strong></p>`;
            html += `<p><strong>Votre solde : ${userData.balance || 0} FCFA</strong></p>`;
            if ((userData.balance || 0) >= total) {
                html += `<button class="btn-success" onclick="checkout()">Passer la commande</button>`;
            } else {
                html += `<p style="color:red;">Solde insuffisant. <a href="dashboard.html" style="color:var(--primary);">Recharger</a></p>`;
            }
            html += '</div>';
            contentDiv.innerHTML = html;
        }

        window.updateQuantity = async function(cartId, newQuantity) {
            const q = parseInt(newQuantity);
            if (q < 1) return;
            await db.collection('cart').doc(cartId).update({ quantity: q });
            showToast('Quantité mise à jour', 'success');
            loadCart();
        };

        window.confirmRemoveFromCart = function(cartId) {
            showConfirm('Voulez-vous retirer cet article du panier ?', async () => {
                await db.collection('cart').doc(cartId).delete();
                showToast('Article retiré', 'success');
                loadCart();
            });
        };

        window.checkout = async function() {
            const cartSnap = await db.collection('cart').where('userId', '==', currentUser.uid).get();
            if (cartSnap.empty) return;

            let total = 0;
            const orders = [];
            for (const doc of cartSnap.docs) {
                const item = doc.data();
                const serviceDoc = await db.collection('services').doc(item.serviceId).get();
                if (!serviceDoc.exists) continue;
                const service = serviceDoc.data();
                total += service.price * (item.quantity || 1);
                orders.push({
                    buyerId: currentUser.uid,
                    sellerId: service.creatorId,
                    serviceId: item.serviceId,
                    amount: service.price,
                    quantity: item.quantity || 1,
                    status: 'pending',
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
            }

            if ((userData.balance || 0) < total) {
                showToast('Solde insuffisant', 'error');
                return;
            }

            showConfirm('Confirmez-vous l\'achat de ces articles ?', async () => {
                const batch = db.batch();
                const userRef = db.collection('users').doc(currentUser.uid);
                batch.update(userRef, { balance: firebase.firestore.FieldValue.increment(-total) });

                for (const order of orders) {
                    const orderRef = db.collection('orders').doc();
                    batch.set(orderRef, order);
                }
                cartSnap.docs.forEach(doc => batch.delete(doc.ref));

                await batch.commit();

                userData.balance -= total;
                showToast('Commande passée avec succès !', 'success');
                loadCart();
            });
        };

        // Modal de confirmation
        window.showConfirm = function(message, callback) {
            document.getElementById('confirmMessage').textContent = message;
            confirmCallback = callback;
            document.getElementById('confirmModal').classList.add('active');
        };
        window.closeConfirmModal = function() {
            document.getElementById('confirmModal').classList.remove('active');
            confirmCallback = null;
        };
        document.getElementById('confirmYes').addEventListener('click', () => {
            if (confirmCallback) {
                confirmCallback();
            }
            closeConfirmModal();
        });
    </script>
</body>
</html>
