<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Panier - AfrikDigitalo</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .cart-item {
            display: flex;
            gap: 20px;
            padding: 20px;
            background: white;
            border-radius: 10px;
            margin-bottom: 15px;
            box-shadow: var(--shadow-sm);
            align-items: center;
        }
        .cart-item img {
            width: 100px;
            height: 100px;
            object-fit: cover;
            border-radius: 10px;
            cursor: pointer;
        }
        .cart-item-details {
            flex: 1;
        }
        .cart-item-details h3 {
            color: var(--secondary);
            margin-bottom: 5px;
        }
        .cart-item-details p {
            color: #777;
        }
        .cart-item-price {
            font-weight: 700;
            color: var(--primary);
            font-size: 1.2rem;
        }
        .cart-item-actions {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .quantity-control {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .quantity-control button {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 1px solid var(--gray-light);
            background: white;
            cursor: pointer;
        }
        .cart-summary {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: var(--shadow-sm);
            margin-top: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .cart-total {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--secondary);
        }
        .cart-balance {
            font-size: 1.2rem;
            color: var(--accent-green);
        }
    </style>
</head>
<body>
    <header class="main-header">
        <div class="logo">
            <img src="https://raw.githubusercontent.com/exaucenapopolo/AfrikDigitalo/refs/heads/main/Photo/ezgif-693a681e148aad8a.gif" alt="AfrikDigitalo">
            <span>Afrik<span class="highlight">Digitalo</span></span>
        </div>
        <div class="header-user">
            <button class="header-icon-btn" onclick="location.href='settings.html'"><i class="fas fa-cog"></i></button>
            <img id="headerAvatar" src="https://randomuser.me/api/portraits/lego/1.jpg" alt="Avatar" onclick="location.href='profile.html'">
        </div>
    </header>

    <div class="dashboard">
        <aside class="sidebar"></aside>
        <main class="main-content">
            <div id="cartContent">Chargement...</div>
        </main>
    </div>

    <nav class="mobile-nav" id="mobileNav">
        <ul id="mobileNavList"></ul>
    </nav>

    <!-- Modal détails service -->
    <div class="modal" id="serviceDetailModal">
        <div class="modal-content">
            <span class="modal-close" onclick="closeServiceModal()">&times;</span>
            <div id="serviceDetailContent"></div>
        </div>
    </div>

    <div class="modal" id="logoutModal">
        <div class="modal-content">
            <span class="modal-close" onclick="closeLogoutModal()">&times;</span>
            <h3>Confirmation</h3>
            <p>Êtes-vous sûr de vouloir vous déconnecter ?</p>
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button class="btn btn-primary" id="confirmLogout">Oui</button>
                <button class="btn btn-secondary" onclick="closeLogoutModal()">Non</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            await requireAuth();
            if (!userData) return;

            if (userData.role !== 'buyer') {
                window.location.href = 'creator-dashboard.html';
                return;
            }

            const sections = [
                { id: 'dashboard', url: 'dashboard.html', icon: 'fas fa-home', label: 'Accueil' },
                { id: 'explore', url: 'explore.html', icon: 'fas fa-search', label: 'Explorer' },
                { id: 'cart', url: 'cart.html', icon: 'fas fa-shopping-cart', label: 'Panier' },
                { id: 'orders', url: 'orders.html', icon: 'fas fa-history', label: 'Mes achats' },
                { id: 'favorites', url: 'favorites.html', icon: 'fas fa-heart', label: 'Favoris' }
            ];
            document.getElementById('mobileNavList').innerHTML = sections.map(s => `
                <li><a href="${s.url}" class="${s.id === 'cart' ? 'active' : ''}"><i class="${s.icon}"></i> <span>${s.label}</span></a></li>
            `).join('');

            await loadCart();
        });

        async function loadCart() {
            const contentDiv = document.getElementById('cartContent');
            const cartSnap = await db.collection('cart').where('userId', '==', currentUser.uid).get();
            if (cartSnap.empty) {
                contentDiv.innerHTML = '<p>Votre panier est vide.</p>';
                return;
            }

            let total = 0;
            let items = [];
            for (const doc of cartSnap.docs) {
                const item = doc.data();
                const serviceDoc = await db.collection('services').doc(item.serviceId).get();
                if (serviceDoc.exists) {
                    const s = serviceDoc.data();
                    items.push({ 
                        id: doc.id, 
                        serviceId: item.serviceId, 
                        title: s.title, 
                        price: s.price, 
                        quantity: item.quantity || 1,
                        images: s.images || [],
                        description: s.description
                    });
                    total += s.price * (item.quantity || 1);
                }
            }

            let html = '<h2>Votre panier</h2>';
            items.forEach(item => {
                const imageHtml = item.images.length > 0 ? `<img src="${item.images[0]}" onclick="showServiceDetails('${item.serviceId}')">` : '';
                html += `
                    <div class="cart-item">
                        ${imageHtml}
                        <div class="cart-item-details">
                            <h3>${item.title}</h3>
                            <p>${item.description.substring(0, 100)}...</p>
                            <div class="cart-item-price">${item.price} FCFA</div>
                        </div>
                        <div class="cart-item-actions">
                            <div class="quantity-control">
                                <button onclick="updateQuantity('${item.id}', -1)">-</button>
                                <span>${item.quantity}</span>
                                <button onclick="updateQuantity('${item.id}', 1)">+</button>
                            </div>
                            <button class="btn btn-danger" onclick="removeFromCart('${item.id}')"><i class="fas fa-trash"></i></button>
                            <button class="btn btn-warning" onclick="addToFavorites('${item.serviceId}')"><i class="fas fa-heart"></i></button>
                        </div>
                    </div>
                `;
            });

            const balance = userData.balance || 0;
            html += `
                <div class="cart-summary">
                    <div>
                        <span class="cart-total">Total: ${total} FCFA</span><br>
                        <span class="cart-balance">Votre solde: ${balance} FCFA</span>
                    </div>
                    ${balance >= total ? 
                        `<button class="btn btn-success" onclick="checkout()">Passer la commande</button>` : 
                        `<p style="color:red;">Solde insuffisant. <a href="recharge.html">Recharger</a></p>`
                    }
                </div>
            `;
            contentDiv.innerHTML = html;
        }

        window.updateQuantity = async function(cartId, delta) {
            const docRef = db.collection('cart').doc(cartId);
            const doc = await docRef.get();
            if (!doc.exists) return;
            const newQty = (doc.data().quantity || 1) + delta;
            if (newQty < 1) return;
            await docRef.update({ quantity: newQty });
            loadCart();
        };

        window.removeFromCart = async function(cartId) {
            if (confirm('Retirer cet article du panier ?')) {
                await db.collection('cart').doc(cartId).delete();
                showToast('Retiré du panier', 'success');
                loadCart();
            }
        };

        window.checkout = async function() {
            const cartSnap = await db.collection('cart').where('userId', '==', currentUser.uid).get();
            if (cartSnap.empty) return;

            let total = 0;
            const orders = [];
            for (const doc of cartSnap.docs) {
                const item = doc.data();
                const serviceDoc = await db.collection('services').doc(item.serviceId).get();
                if (!serviceDoc.exists) continue;
                const service = serviceDoc.data();
                total += service.price * (item.quantity || 1);
                orders.push({
                    buyerId: currentUser.uid,
                    sellerId: service.creatorId,
                    serviceId: item.serviceId,
                    amount: service.price * (item.quantity || 1),
                    status: 'pending',
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
            }

            if ((userData.balance || 0) < total) {
                showToast('Solde insuffisant', 'error');
                return;
            }

            // Appliquer commission 10% pour l'entreprise
            const companyCommission = total * 0.1;
            const sellerAmount = total - companyCommission;

            const batch = db.batch();
            // Déduire le solde de l'acheteur
            const userRef = db.collection('users').doc(currentUser.uid);
            batch.update(userRef, { balance: firebase.firestore.FieldValue.increment(-total) });

            // Ajouter aux revenus du vendeur (à faire dans le document du vendeur)
            // On peut ajouter un champ balance au vendeur aussi
            for (const order of orders) {
                const sellerRef = db.collection('users').doc(order.sellerId);
                batch.update(sellerRef, { balance: firebase.firestore.FieldValue.increment(order.amount - (order.amount * 0.1)) }); // 90% au vendeur
            }

            // Créer les commandes et supprimer le panier
            for (const order of orders) {
                const orderRef = db.collection('orders').doc();
                batch.set(orderRef, order);
            }
            cartSnap.docs.forEach(doc => batch.delete(doc.ref));

            await batch.commit();

            // Mettre à jour le solde local
            userData.balance -= total;
            showToast('Commande passée avec succès !', 'success');
            loadCart();
        };

        window.showServiceDetails = async function(serviceId) {
            const doc = await db.collection('services').doc(serviceId).get();
            if (!doc.exists) return;
            const s = doc.data();
            const creatorDoc = await db.collection('users').doc(s.creatorId).get();
            const creator = creatorDoc.data();

            let imagesHtml = '';
            if (s.images && s.images.length) {
                imagesHtml = '<div style="display:flex; gap:10px; flex-wrap:wrap; margin-bottom:15px;">';
                s.images.forEach(url => {
                    imagesHtml += `<img src="${url}" style="width:200px; height:150px; object-fit:cover; border-radius:5px; cursor:pointer;" onclick="showImageModal('${url}')">`;
                });
                imagesHtml += '</div>';
            }

            document.getElementById('serviceDetailContent').innerHTML = `
                <h3>${s.title}</h3>
                ${imagesHtml}
                <p><strong>Description:</strong> ${s.description}</p>
                <p><strong>Prix:</strong> ${s.price} FCFA</p>
                <p><strong>Catégorie:</strong> ${s.category}</p>
                <p><strong>Délai de livraison:</strong> ${s.deliveryDays} jours</p>
                <p><strong>Vendeur:</strong> <a href="vendor-profile.html?id=${s.creatorId}" style="color: var(--primary);">${creator ? creator.name : 'Inconnu'}</a></p>
            `;
            document.getElementById('serviceDetailModal').classList.add('active');
        };

        window.closeServiceModal = function() {
            document.getElementById('serviceDetailModal').classList.remove('active');
        };

        window.addToFavorites = async function(serviceId) {
            const existing = await db.collection('favorites').where('userId', '==', currentUser.uid).where('serviceId', '==', serviceId).get();
            if (!existing.empty) {
                showToast('Déjà dans les favoris', 'info');
                return;
            }
            await db.collection('favorites').add({
                userId: currentUser.uid,
                serviceId: serviceId,
                addedAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            showToast('Ajouté aux favoris', 'success');
        };
    </script>
</body>
</html>
