<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Panier - AfrikDigitalo</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .cart-item {
            display: flex;
            gap: 20px;
            padding: 20px;
            background: white;
            border-radius: 15px;
            margin-bottom: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            align-items: center;
        }
        .cart-item-image {
            width: 100px;
            height: 100px;
            object-fit: cover;
            border-radius: 10px;
            cursor: pointer;
        }
        .cart-item-details {
            flex: 1;
        }
        .cart-item-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--secondary);
            cursor: pointer;
        }
        .cart-item-price {
            font-size: 1.1rem;
            color: var(--primary);
            font-weight: 700;
        }
        .quantity-control {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 10px 0;
        }
        .quantity-btn {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: none;
            background: var(--gray-light);
            cursor: pointer;
            font-weight: bold;
        }
        .quantity-btn:hover {
            background: var(--primary);
            color: white;
        }
        .cart-actions {
            display: flex;
            gap: 10px;
        }
        .cart-summary {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-top: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }
        .btn-checkout {
            background: linear-gradient(135deg, var(--accent-green), #2ECC71);
            color: white;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            width: 100%;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-checkout:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(39,174,96,0.3);
        }
        .btn-checkout:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <header class="main-header">
        <div class="logo">
            <img src="https://raw.githubusercontent.com/exaucenapopolo/AfrikDigitalo/refs/heads/main/Photo/ezgif-693a681e148aad8a.gif" alt="AfrikDigitalo" style="height: 40px;">
            <span>Afrik<span class="highlight">Digitalo</span></span>
        </div>
        <div class="header-user">
            <button class="header-icon-btn" onclick="location.href='settings.html'"><i class="fas fa-cog"></i></button>
            <img id="headerAvatar" src="https://randomuser.me/api/portraits/lego/1.jpg" alt="Avatar" onclick="location.href='profile.html'">
        </div>
    </header>

    <div class="dashboard">
        <main class="main-content" id="mainContent">
            <div id="verificationBanner" class="verification-banner" style="display: none;">
                <p><i class="fas fa-exclamation-triangle"></i> Votre adresse email n'est pas encore vérifiée.</p>
                <button id="resendVerificationBtn">Renvoyer l'email</button>
            </div>

            <h2>Votre panier</h2>
            <div id="cartContent">Chargement...</div>
        </main>
    </div>

    <nav class="mobile-nav" id="mobileNav">
        <ul id="mobileNavList"></ul>
    </nav>

    <!-- Modal pour afficher les détails d'un service -->
    <div class="modal" id="serviceDetailModal">
        <div class="modal-content" style="max-width: 800px;">
            <span class="modal-close" onclick="closeServiceModal()">&times;</span>
            <div id="serviceDetailContent"></div>
        </div>
    </div>

    <!-- Modal pour afficher une image en grand -->
    <div class="modal" id="imageModal">
        <div class="modal-content" style="background: transparent; box-shadow: none; max-width: 90%;">
            <span class="modal-close" onclick="closeImageModal()" style="color: white;">&times;</span>
            <img id="fullImage" class="modal-image" src="">
        </div>
    </div>

    <div class="modal" id="logoutModal">
        <div class="modal-content">
            <span class="modal-close" onclick="closeLogoutModal()">&times;</span>
            <h3>Confirmation</h3>
            <p>Êtes-vous sûr de vouloir vous déconnecter ?</p>
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button class="btn btn-primary" id="confirmLogout">Oui</button>
                <button class="btn btn-secondary" onclick="closeLogoutModal()">Non</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            await requireAuth();
            if (!userData) return;

            if (userData.role !== 'buyer') {
                window.location.href = 'dashboard.html';
                return;
            }

            const sections = [
                { id: 'dashboard', url: 'dashboard.html', icon: 'fas fa-home', label: 'Accueil' },
                { id: 'explore', url: 'explore.html', icon: 'fas fa-search', label: 'Explorer' },
                { id: 'cart', url: 'cart.html', icon: 'fas fa-shopping-cart', label: 'Panier' },
                { id: 'orders', url: 'orders.html', icon: 'fas fa-history', label: 'Achats' },
                { id: 'favorites', url: 'favorites.html', icon: 'fas fa-heart', label: 'Favoris' }
            ];
            document.getElementById('mobileNavList').innerHTML = sections.map(s => `
                <li><a href="${s.url}" class="${s.id === 'cart' ? 'active' : ''}"><i class="${s.icon}"></i> <span>${s.label}</span></a></li>
            `).join('');

            await loadCart();
        });

        async function loadCart() {
            const contentDiv = document.getElementById('cartContent');
            const cartSnap = await db.collection('cart').where('userId', '==', currentUser.uid).get();
            if (cartSnap.empty) {
                contentDiv.innerHTML = '<p>Votre panier est vide.</p>';
                return;
            }

            let total = 0;
            let items = [];
            for (const doc of cartSnap.docs) {
                const item = doc.data();
                const serviceDoc = await db.collection('services').doc(item.serviceId).get();
                if (serviceDoc.exists) {
                    const s = serviceDoc.data();
                    items.push({ 
                        id: doc.id, 
                        serviceId: item.serviceId, 
                        title: s.title, 
                        price: s.price, 
                        quantity: item.quantity || 1,
                        images: s.images || [],
                        description: s.description,
                        deliveryDays: s.deliveryDays,
                        category: s.category
                    });
                    total += s.price * (item.quantity || 1);
                }
            }

            let html = '';
            items.forEach(item => {
                const imageHtml = item.images.length > 0 ? 
                    `<img src="${item.images[0]}" class="cart-item-image" onclick="showImage('${item.images[0]}')">` : 
                    '<div style="width:100px; height:100px; background:#f0f0f0; border-radius:10px;"></div>';
                
                html += `
                    <div class="cart-item">
                        ${imageHtml}
                        <div class="cart-item-details">
                            <div class="cart-item-title" onclick="showServiceDetails('${item.serviceId}')">${item.title}</div>
                            <div class="cart-item-price">${item.price} FCFA</div>
                            <div class="quantity-control">
                                <button class="quantity-btn" onclick="updateQuantity('${item.id}', ${item.quantity - 1})">-</button>
                                <span>${item.quantity}</span>
                                <button class="quantity-btn" onclick="updateQuantity('${item.id}', ${item.quantity + 1})">+</button>
                            </div>
                            <div class="cart-actions">
                                <button class="btn btn-warning" onclick="addToFavorites('${item.serviceId}')"><i class="fas fa-heart"></i> Favoris</button>
                                <button class="btn btn-danger" onclick="confirmRemove('${item.id}')"><i class="fas fa-trash"></i> Supprimer</button>
                            </div>
                        </div>
                    </div>
                `;
            });

            html += `
                <div class="cart-summary">
                    <h3>Récapitulatif</h3>
                    <p>Total: <strong>${total} FCFA</strong></p>
                    <p>Votre solde: <strong>${userData.balance || 0} FCFA</strong></p>
                    <button class="btn-checkout" onclick="checkout()" ${(userData.balance || 0) < total ? 'disabled' : ''}>
                        ${(userData.balance || 0) >= total ? 'Passer la commande' : 'Solde insuffisant'}
                    </button>
                </div>
            `;

            contentDiv.innerHTML = html;
        }

        window.updateQuantity = async function(cartId, newQuantity) {
            if (newQuantity < 1) {
                if (confirm('Voulez-vous supprimer cet article ?')) {
                    await db.collection('cart').doc(cartId).delete();
                    showToast('Article supprimé', 'success');
                    loadCart();
                }
                return;
            }
            await db.collection('cart').doc(cartId).update({ quantity: newQuantity });
            showToast('Quantité mise à jour', 'success');
            loadCart();
        };

        window.confirmRemove = function(cartId) {
            if (confirm('Êtes-vous sûr de vouloir retirer cet article du panier ?')) {
                db.collection('cart').doc(cartId).delete().then(() => {
                    showToast('Article retiré', 'success');
                    loadCart();
                });
            }
        };

        window.showServiceDetails = async function(serviceId) {
            const doc = await db.collection('services').doc(serviceId).get();
            if (!doc.exists) return;
            const s = doc.data();
            const creatorDoc = await db.collection('users').doc(s.creatorId).get();
            const creator = creatorDoc.data();

            let imagesHtml = '';
            if (s.images && s.images.length) {
                imagesHtml = '<div style="display:flex; gap:10px; flex-wrap:wrap; margin-bottom:15px;">';
                s.images.forEach(url => {
                    imagesHtml += `<img src="${url}" style="width:200px; height:150px; object-fit:cover; border-radius:10px; cursor:pointer;" onclick="showImage('${url}')">`;
                });
                imagesHtml += '</div>';
            }

            let faqHtml = '';
            if (s.faq && s.faq.length) {
                faqHtml = '<h4>Questions fréquentes</h4>';
                s.faq.forEach((item, index) => {
                    faqHtml += `
                        <div style="margin-bottom:10px; border-bottom:1px solid #eee; padding-bottom:5px;">
                            <strong>Q: ${item.question}</strong><br>
                            <span>R: ${item.answer}</span>
                        </div>
                    `;
                });
            }

            const modalContent = document.getElementById('serviceDetailContent');
            modalContent.innerHTML = `
                <h3>${s.title}</h3>
                ${imagesHtml}
                <p><strong>Description:</strong> ${s.description}</p>
                <p><strong>Prix:</strong> ${s.price} FCFA</p>
                <p><strong>Catégorie:</strong> ${s.category}</p>
                <p><strong>Délai de livraison:</strong> ${s.deliveryDays} jours</p>
                <p><strong>Vendeur:</strong> <a href="vendor-profile.html?id=${s.creatorId}" style="color: var(--primary);">${creator ? creator.name : 'Inconnu'}</a></p>
                ${faqHtml}
            `;
            document.getElementById('serviceDetailModal').classList.add('active');
        };

        window.closeServiceModal = function() {
            document.getElementById('serviceDetailModal').classList.remove('active');
        };

        window.showImage = function(url) {
            document.getElementById('fullImage').src = url;
            document.getElementById('imageModal').classList.add('active');
        };

        window.closeImageModal = function() {
            document.getElementById('imageModal').classList.remove('active');
        };

        window.addToFavorites = async function(serviceId) {
            const existing = await db.collection('favorites').where('userId', '==', currentUser.uid).where('serviceId', '==', serviceId).get();
            if (!existing.empty) {
                showToast('Déjà dans les favoris', 'info');
                return;
            }
            await db.collection('favorites').add({
                userId: currentUser.uid,
                serviceId: serviceId,
                addedAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            showToast('Ajouté aux favoris', 'success');
        };

        window.checkout = async function() {
            const cartSnap = await db.collection('cart').where('userId', '==', currentUser.uid).get();
            if (cartSnap.empty) return;

            let total = 0;
            const orders = [];
            for (const doc of cartSnap.docs) {
                const item = doc.data();
                const serviceDoc = await db.collection('services').doc(item.serviceId).get();
                if (!serviceDoc.exists) continue;
                const service = serviceDoc.data();
                total += service.price * (item.quantity || 1);
                orders.push({
                    buyerId: currentUser.uid,
                    sellerId: service.creatorId,
                    serviceId: item.serviceId,
                    amount: service.price * (item.quantity || 1),
                    quantity: item.quantity || 1,
                    status: 'pending',
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
            }

            if ((userData.balance || 0) < total) {
                showToast('Solde insuffisant', 'error');
                return;
            }

            if (!confirm(`Confirmez-vous l'achat pour un total de ${total} FCFA ?`)) return;

            const batch = db.batch();
            const userRef = db.collection('users').doc(currentUser.uid);
            batch.update(userRef, { balance: firebase.firestore.FieldValue.increment(-total) });

            for (const order of orders) {
                const orderRef = db.collection('orders').doc();
                batch.set(orderRef, order);
            }
            cartSnap.docs.forEach(doc => batch.delete(doc.ref));

            await batch.commit();

            userData.balance -= total;
            showToast('Commande passée avec succès !', 'success');
            loadCart();
        };
    </script>
</body>
</html>
