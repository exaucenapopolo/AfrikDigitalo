<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Paramètres - AfrikDigitalo</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="main-header">
        <div class="logo">
            <img src="https://raw.githubusercontent.com/exaucenapopolo/AfrikDigitalo/refs/heads/main/Photo/ezgif-693a681e148aad8a.gif" alt="AfrikDigitalo">
            <span>Afrik<span class="highlight">Digitalo</span></span>
        </div>
        <div class="header-user">
            <button class="header-icon-btn" onclick="location.href='settings.html'"><i class="fas fa-cog"></i></button>
            <img id="headerAvatar" src="https://randomuser.me/api/portraits/lego/1.jpg" alt="Avatar" onclick="location.href='profile.html'">
        </div>
    </header>

    <div class="dashboard">
        <aside class="sidebar"></aside>
        <main class="main-content">
            <div class="settings-group">
                <h3>Notifications</h3>
                <div class="setting-item">
                    <span>Notifications par email</span>
                    <label class="toggle-switch">
                        <input type="checkbox" id="notifEmail">
                        <span class="slider"></span>
                    </label>
                </div>
                <div class="setting-item">
                    <span>Notifications push</span>
                    <label class="toggle-switch">
                        <input type="checkbox" id="notifPush">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>
            <div class="settings-group">
                <h3>Confidentialité</h3>
                <div class="setting-item">
                    <span>Compte public</span>
                    <label class="toggle-switch">
                        <input type="checkbox" id="profilePublic">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>
            <div class="settings-group">
                <h3>Préférences</h3>
                <div class="setting-item">
                    <span>Langue</span>
                    <select id="lang">
                        <option value="fr">Français</option>
                        <option value="en">Anglais</option>
                    </select>
                </div>
            </div>
            <div class="settings-group" id="creatorSettings" style="display: none;">
                <h3>Paramètres créateur</h3>
                <div class="setting-item">
                    <span>Mode vacances</span>
                    <label class="toggle-switch">
                        <input type="checkbox" id="vacationMode">
                        <span class="slider"></span>
                    </label>
                </div>
                <div class="setting-item">
                    <span>Commission personnalisée (%)</span>
                    <input type="number" id="customCommission" min="0" max="100" step="0.1" value="10">
                </div>
            </div>
            <button class="btn-save" onclick="saveSettings()">Enregistrer les paramètres</button>
        </main>
    </div>

    <nav class="mobile-nav" id="mobileNav">
        <ul id="mobileNavList"></ul>
    </nav>

    <div id="toast" class="toast"></div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            await requireAuth();
            if (!userData) return;

            if (userData.role === 'creator') {
                document.getElementById('creatorSettings').style.display = 'block';
            }

            if (userData.settings) {
                document.getElementById('notifEmail').checked = userData.settings.emailNotifications || false;
                document.getElementById('notifPush').checked = userData.settings.pushNotifications || false;
                document.getElementById('profilePublic').checked = userData.settings.publicProfile !== false;
                document.getElementById('lang').value = userData.settings.lang || 'fr';
                if (userData.role === 'creator') {
                    document.getElementById('vacationMode').checked = userData.settings.vacationMode || false;
                    document.getElementById('customCommission').value = userData.settings.customCommission || 10;
                }
            }

            const sections = userData.role === 'creator' ? [
                { id: 'dashboard', url: 'creator-dashboard.html', icon: 'fas fa-home', label: 'Accueil' },
                { id: 'services', url: 'services.html', icon: 'fas fa-list', label: 'Services' },
                { id: 'orders', url: 'creator-orders.html', icon: 'fas fa-shopping-bag', label: 'Commandes' },
                { id: 'followers', url: 'followers.html', icon: 'fas fa-users', label: 'Abonnés' }
            ] : [
                { id: 'dashboard', url: 'dashboard.html', icon: 'fas fa-home', label: 'Accueil' },
                { id: 'explore', url: 'explore.html', icon: 'fas fa-search', label: 'Explorer' },
                { id: 'cart', url: 'cart.html', icon: 'fas fa-shopping-cart', label: 'Panier' },
                { id: 'orders', url: 'orders.html', icon: 'fas fa-history', label: 'Achats' },
                { id: 'favorites', url: 'favorites.html', icon: 'fas fa-heart', label: 'Favoris' }
            ];
            document.getElementById('mobileNavList').innerHTML = sections.map(s => `
                <li><a href="${s.url}" class=""><i class="${s.icon}"></i> <span>${s.label}</span></a></li>
            `).join('');
        });

        window.saveSettings = async function() {
            const settings = {
                emailNotifications: document.getElementById('notifEmail').checked,
                pushNotifications: document.getElementById('notifPush').checked,
                publicProfile: document.getElementById('profilePublic').checked,
                lang: document.getElementById('lang').value
            };
            if (userData.role === 'creator') {
                settings.vacationMode = document.getElementById('vacationMode').checked;
                settings.customCommission = parseFloat(document.getElementById('customCommission').value);
            }
            await db.collection('users').doc(currentUser.uid).update({ settings });
            showToast('Paramètres enregistrés', 'success');
        };
    </script>
</body>
</html>
