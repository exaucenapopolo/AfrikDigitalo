<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Accueil - AfrikDigitalo</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .welcome-section {
            background: linear-gradient(135deg, var(--primary), var(--accent-green));
            padding: 40px;
            border-radius: 20px;
            color: white;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .welcome-section h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        .welcome-section p {
            font-size: 1.2rem;
            opacity: 0.9;
        }
        .balance-card {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 20px;
            padding: 30px;
            color: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 30px;
            transition: transform 0.3s;
        }
        .balance-card:hover {
            transform: translateY(-5px);
        }
        .balance-card h2 {
            font-size: 1.2rem;
            opacity: 0.9;
            margin-bottom: 10px;
        }
        .balance-card .amount {
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 20px;
        }
        .balance-actions {
            display: flex;
            gap: 15px;
        }
        .balance-actions .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-recharge {
            background: white;
            color: var(--primary);
        }
        .btn-recharge:hover {
            background: var(--primary);
            color: white;
        }
        .btn-withdraw {
            background: rgba(255,255,255,0.2);
            color: white;
            border: 1px solid white;
        }
        .btn-withdraw:hover {
            background: white;
            color: var(--primary);
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            gap: 15px;
            transition: all 0.3s;
        }
        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
        }
        .stat-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, var(--primary), var(--accent-green));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: white;
        }
        .stat-details h3 {
            font-size: 0.9rem;
            color: #777;
            font-weight: 400;
        }
        .stat-details p {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--secondary);
        }
        .orders-table {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }
        .orders-table h2 {
            margin-bottom: 20px;
            color: var(--secondary);
            font-size: 1.3rem;
        }
        .activity-item {
            padding: 15px;
            border-bottom: 1px solid var(--gray-light);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .activity-item:last-child {
            border-bottom: none;
        }
        .status-badge {
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        .status-badge.completed { background: #d4edda; color: #155724; }
        .status-badge.pending { background: #fff3cd; color: #856404; }
        .status-badge.rejected { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <header class="main-header">
        <div class="logo">
            <img src="https://raw.githubusercontent.com/exaucenapopolo/AfrikDigitalo/refs/heads/main/Photo/ezgif-693a681e148aad8a.gif" alt="AfrikDigitalo" style="height: 40px;">
            <span>Afrik<span class="highlight">Digitalo</span></span>
        </div>
        <div class="header-user">
            <button class="header-icon-btn" onclick="location.href='settings.html'"><i class="fas fa-cog"></i></button>
            <img id="headerAvatar" src="https://randomuser.me/api/portraits/lego/1.jpg" alt="Avatar" onclick="location.href='profile.html'">
        </div>
    </header>

    <div class="dashboard">
        <main class="main-content" id="mainContent">
            <div id="verificationBanner" class="verification-banner" style="display: none;">
                <p><i class="fas fa-exclamation-triangle"></i> Votre adresse email n'est pas encore vérifiée. Veuillez vérifier votre boîte mail pour activer votre compte.</p>
                <button id="resendVerificationBtn">Renvoyer l'email</button>
            </div>

            <div id="dynamicContent">
                <!-- Le contenu sera généré ici -->
            </div>
        </main>
    </div>

    <nav class="mobile-nav" id="mobileNav">
        <ul id="mobileNavList"></ul>
    </nav>

    <div class="modal" id="logoutModal">
        <div class="modal-content">
            <span class="modal-close" onclick="closeLogoutModal()">&times;</span>
            <h3>Confirmation</h3>
            <p>Êtes-vous sûr de vouloir vous déconnecter ?</p>
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button class="btn btn-primary" id="confirmLogout">Oui</button>
                <button class="btn btn-secondary" onclick="closeLogoutModal()">Non</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            await requireAuth();
            if (!userData) return;

            // Définir les sections de navigation en fonction du rôle
            const sections = userData.role === 'creator' ? [
                { id: 'dashboard', url: 'dashboard.html', icon: 'fas fa-home', label: 'Accueil' },
                { id: 'services', url: 'services.html', icon: 'fas fa-list', label: 'Services' },
                { id: 'orders', url: 'orders.html', icon: 'fas fa-shopping-bag', label: 'Commandes' },
                { id: 'followers', url: 'followers.html', icon: 'fas fa-users', label: 'Abonnés' }
            ] : [
                { id: 'dashboard', url: 'dashboard.html', icon: 'fas fa-home', label: 'Accueil' },
                { id: 'explore', url: 'explore.html', icon: 'fas fa-search', label: 'Explorer' },
                { id: 'cart', url: 'cart.html', icon: 'fas fa-shopping-cart', label: 'Panier' },
                { id: 'orders', url: 'orders.html', icon: 'fas fa-history', label: 'Achats' },
                { id: 'favorites', url: 'favorites.html', icon: 'fas fa-heart', label: 'Favoris' }
            ];

            const mobileNavList = document.getElementById('mobileNavList');
            mobileNavList.innerHTML = sections.map(s => `
                <li><a href="${s.url}" class="${s.id === 'dashboard' ? 'active' : ''}"><i class="${s.icon}"></i> <span>${s.label}</span></a></li>
            `).join('');

            // Charger les données du tableau de bord
            await loadDashboard();
        });

        async function loadDashboard() {
            const contentDiv = document.getElementById('dynamicContent');
            if (!contentDiv) return;

            if (userData.role === 'creator') {
                // Statistiques créateur
                const servicesSnap = await db.collection('services').where('creatorId', '==', currentUser.uid).get();
                const ordersSnap = await db.collection('orders').where('sellerId', '==', currentUser.uid).get();
                const followersSnap = await db.collection('follows').where('followingId', '==', currentUser.uid).get();

                let revenue = 0;
                ordersSnap.forEach(doc => revenue += doc.data().amount || 0);

                let totalCartAdds = 0;
                for (const doc of servicesSnap.docs) {
                    const serviceId = doc.id;
                    const cartSnap = await db.collection('cart').where('serviceId', '==', serviceId).get();
                    totalCartAdds += cartSnap.size;
                }

                let totalFavs = 0;
                for (const doc of servicesSnap.docs) {
                    const serviceId = doc.id;
                    const favSnap = await db.collection('favorites').where('serviceId', '==', serviceId).get();
                    totalFavs += favSnap.size;
                }

                let html = `
                    <div class="welcome-section">
                        <h1>Bonjour, ${userData.name || 'Créateur'} 👋</h1>
                        <p>Voici un résumé de votre activité</p>
                    </div>
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-icon"><i class="fas fa-dollar-sign"></i></div>
                            <div class="stat-details"><h3>Revenus</h3><p>${revenue} FCFA</p></div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon"><i class="fas fa-shopping-cart"></i></div>
                            <div class="stat-details"><h3>Commandes</h3><p>${ordersSnap.size}</p></div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon"><i class="fas fa-users"></i></div>
                            <div class="stat-details"><h3>Abonnés</h3><p>${followersSnap.size}</p></div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon"><i class="fas fa-list"></i></div>
                            <div class="stat-details"><h3>Services</h3><p>${servicesSnap.size}</p></div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon"><i class="fas fa-cart-plus"></i></div>
                            <div class="stat-details"><h3>Ajouts panier</h3><p>${totalCartAdds}</p></div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon"><i class="fas fa-heart"></i></div>
                            <div class="stat-details"><h3>Favoris</h3><p>${totalFavs}</p></div>
                        </div>
                    </div>
                    <div class="orders-table"><h2>Dernières commandes</h2><div id="recentOrdersList">Chargement...</div></div>
                `;
                contentDiv.innerHTML = html;

                const recentOrders = await db.collection('orders')
                    .where('sellerId', '==', currentUser.uid)
                    .orderBy('createdAt', 'desc')
                    .limit(5)
                    .get();
                const listDiv = document.getElementById('recentOrdersList');
                if (recentOrders.empty) {
                    listDiv.innerHTML = '<p>Aucune commande récente.</p>';
                } else {
                    let listHtml = '';
                    recentOrders.forEach(doc => {
                        const o = doc.data();
                        const date = o.createdAt ? new Date(o.createdAt.toDate()).toLocaleDateString() : 'N/A';
                        listHtml += `
                            <div class="activity-item">
                                <span>Commande #${doc.id.slice(0,6)} - ${o.amount} FCFA</span>
                                <span class="status-badge ${o.status}">${o.status}</span>
                                <small>${date}</small>
                            </div>
                        `;
                    });
                    listDiv.innerHTML = listHtml;
                }
            } else {
                // Acheteur
                const ordersSnap = await db.collection('orders').where('buyerId', '==', currentUser.uid).get();
                let spent = 0;
                ordersSnap.forEach(doc => spent += doc.data().amount || 0);
                const favSnap = await db.collection('favorites').where('userId', '==', currentUser.uid).get();

                let html = `
                    <div class="welcome-section">
                        <h1>Bonjour, ${userData.name || 'Acheteur'} 👋</h1>
                        <p>Prêt à découvrir de nouveaux services ?</p>
                    </div>
                    <div class="balance-card">
                        <h2>Votre solde</h2>
                        <div class="amount">${userData.balance || 0} FCFA</div>
                        <div class="balance-actions">
                            <button class="btn btn-recharge" onclick="location.href='recharge.html'">Recharger</button>
                            <button class="btn btn-withdraw" onclick="location.href='withdraw.html'">Retirer</button>
                        </div>
                    </div>
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-icon"><i class="fas fa-shopping-bag"></i></div>
                            <div class="stat-details"><h3>Achats</h3><p>${ordersSnap.size}</p></div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon"><i class="fas fa-clock"></i></div>
                            <div class="stat-details"><h3>Dépenses</h3><p>${spent} FCFA</p></div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon"><i class="fas fa-heart"></i></div>
                            <div class="stat-details"><h3>Favoris</h3><p>${favSnap.size}</p></div>
                        </div>
                    </div>
                    <div class="orders-table">
                        <h2>Derniers achats</h2>
                        <div id="recentPurchasesList">Chargement...</div>
                    </div>
                    <div class="orders-table">
                        <h2>Suggestions pour vous</h2>
                        <div id="suggestionsList">Chargement...</div>
                    </div>
                `;
                contentDiv.innerHTML = html;

                // Derniers achats
                const recentPurchases = await db.collection('orders')
                    .where('buyerId', '==', currentUser.uid)
                    .orderBy('createdAt', 'desc')
                    .limit(5)
                    .get();
                const listDiv = document.getElementById('recentPurchasesList');
                if (recentPurchases.empty) {
                    listDiv.innerHTML = '<p>Aucun achat récent.</p>';
                } else {
                    let listHtml = '';
                    recentPurchases.forEach(doc => {
                        const o = doc.data();
                        const date = o.createdAt ? new Date(o.createdAt.toDate()).toLocaleDateString() : 'N/A';
                        listHtml += `
                            <div class="activity-item">
                                <span>Achat #${doc.id.slice(0,6)} - ${o.amount} FCFA</span>
                                <span class="status-badge ${o.status}">${o.status}</span>
                                <small>${date}</small>
                            </div>
                        `;
                    });
                    listDiv.innerHTML = listHtml;
                }

                // Suggestions (services les plus populaires)
                const servicesSnap = await db.collection('services').limit(3).get();
                let suggestionsHtml = '<div class="services-grid">';
                servicesSnap.forEach(doc => {
                    const s = doc.data();
                    suggestionsHtml += `
                        <div class="service-card">
                            ${s.images && s.images[0] ? `<img src="${s.images[0]}" style="width:100%; height:150px; object-fit:cover; border-radius:10px;">` : ''}
                            <h3>${s.title}</h3>
                            <p>${s.description.substring(0,60)}...</p>
                            <div class="service-price">${s.price} FCFA</div>
                            <button class="btn-buy" onclick="location.href='explore.html'">Voir</button>
                        </div>
                    `;
                });
                suggestionsHtml += '</div>';
                document.getElementById('suggestionsList').innerHTML = suggestionsHtml;
            }
        }
    </script>
</body>
</html>
