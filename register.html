<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription - AfrikDigitalo</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --primary: #FF6B35;
            --secondary: #2E4057;
            --accent-green: #27AE60;
            --accent-blue: #3498DB;
            --light-bg: #F8F9FA;
            --dark: #2C3E50;
            --text: #4A5568;
            --white: #FFFFFF;
            --gray-light: #E2E8F0;
            --danger: #E74C3C;
            --warning: #F39C12;
            --success: #27AE60;
        }
        body {
            font-family: 'Open Sans', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e9ecef 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .register-container {
            background: var(--white);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 600px;
            padding: 40px;
            position: relative;
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo i {
            font-size: 3rem;
            color: var(--primary);
        }
        .logo span {
            font-family: 'Montserrat', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            color: var(--secondary);
            display: block;
            margin-top: 10px;
        }
        .logo .highlight { color: var(--primary); }
        h2 {
            text-align: center;
            color: var(--secondary);
            margin-bottom: 30px;
            font-weight: 600;
            font-size: 1.8rem;
        }
        /* Progress bar */
        .progress-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 40px;
            position: relative;
        }
        .progress-bar::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--gray-light);
            transform: translateY(-50%);
            z-index: 1;
        }
        .progress-step {
            position: relative;
            z-index: 2;
            background: var(--white);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid var(--gray-light);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            color: var(--text);
            transition: all 0.3s;
        }
        .progress-step.active {
            border-color: var(--primary);
            background: var(--primary);
            color: white;
        }
        .progress-step.completed {
            border-color: var(--accent-green);
            background: var(--accent-green);
            color: white;
        }
        .step-label {
            position: absolute;
            top: 50px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.8rem;
            white-space: nowrap;
            color: var(--text);
        }
        /* Étapes */
        .step {
            display: none;
            opacity: 0;
            transition: opacity 0.4s ease;
        }
        .step.active-step {
            display: block;
            opacity: 1;
        }
        .form-group {
            margin-bottom: 20px;
            position: relative;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--secondary);
            font-size: 0.95rem;
        }
        input, select, textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid var(--gray-light);
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s, box-shadow 0.3s;
            font-family: 'Open Sans', sans-serif;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(255,107,53,0.1);
        }
        input.valid {
            border-color: var(--success);
        }
        input.invalid {
            border-color: var(--danger);
        }
        textarea {
            resize: vertical;
            min-height: 80px;
        }
        .btn {
            padding: 14px 30px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s;
            width: 100%;
        }
        .btn:hover {
            background: #e55a2b;
            transform: translateY(-2px);
        }
        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        .btn-secondary {
            background: transparent;
            border: 2px solid var(--primary);
            color: var(--primary);
            margin-top: 10px;
        }
        .btn-secondary:hover {
            background: var(--primary);
            color: white;
        }
        /* Indicateur de force du mot de passe */
        .password-strength {
            margin-top: 5px;
            height: 5px;
            width: 100%;
            background: #eee;
            border-radius: 5px;
            overflow: hidden;
        }
        .strength-bar {
            height: 100%;
            width: 0%;
            transition: width 0.3s, background 0.3s;
        }
        .strength-text {
            font-size: 0.8rem;
            margin-top: 3px;
        }
        .weak { color: var(--danger); }
        .medium { color: var(--warning); }
        .strong { color: var(--success); }
        /* Toast notification */
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: white;
            border-left: 4px solid var(--primary);
            border-radius: 5px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            padding: 15px 25px;
            z-index: 9999;
            display: flex;
            align-items: center;
            gap: 10px;
            transform: translateX(400px);
            transition: transform 0.3s;
        }
        .toast.show {
            transform: translateX(0);
        }
        .toast.success { border-left-color: var(--success); }
        .toast.error { border-left-color: var(--danger); }
        .toast.warning { border-left-color: var(--warning); }
        .toast i { font-size: 1.5rem; }
        /* Responsive */
        @media (max-width: 600px) {
            .register-container { padding: 20px; }
        }
    </style>
</head>
<body>
    <!-- Toast container -->
    <div id="toast" class="toast"></div>

    <div class="register-container">
        <div class="logo">
            <i class="fas fa-globe-africa"></i>
            <span>Afrik<span class="highlight">Digitalo</span></span>
        </div>
        <h2>Créer un compte</h2>

        <!-- Barre de progression -->
        <div class="progress-bar">
            <div class="progress-step" id="step1-progress" data-step="1">1<span class="step-label">Rôle</span></div>
            <div class="progress-step" id="step2-progress" data-step="2">2<span class="step-label">Profil</span></div>
            <div class="progress-step" id="step3-progress" data-step="3">3<span class="step-label">Infos</span></div>
            <div class="progress-step" id="step4-progress" data-step="4">4<span class="step-label">Vérification</span></div>
        </div>

        <!-- Formulaire multi-étapes -->
        <form id="registerForm">
            <!-- Étape 1 : Choix du rôle -->
            <div class="step active-step" id="step1">
                <div class="form-group">
                    <label>Vous êtes ?</label>
                    <div style="display: flex; gap: 20px; margin-top: 10px;">
                        <label style="flex: 1; border: 2px solid var(--gray-light); border-radius: 8px; padding: 20px; text-align: center; cursor: pointer; transition: border-color 0.3s;" id="roleBuyerLabel">
                            <input type="radio" name="role" value="buyer" style="display: none;" id="roleBuyer" checked>
                            <i class="fas fa-user" style="font-size: 2rem; color: var(--secondary); display: block; margin-bottom: 10px;"></i>
                            <span style="font-weight: 600;">Acheteur</span>
                            <small style="display: block; color: var(--text); margin-top: 5px;">Je cherche des services</small>
                        </label>
                        <label style="flex: 1; border: 2px solid var(--gray-light); border-radius: 8px; padding: 20px; text-align: center; cursor: pointer;" id="roleCreatorLabel">
                            <input type="radio" name="role" value="creator" style="display: none;" id="roleCreator">
                            <i class="fas fa-paint-brush" style="font-size: 2rem; color: var(--secondary); display: block; margin-bottom: 10px;"></i>
                            <span style="font-weight: 600;">Créateur</span>
                            <small style="display: block; color: var(--text); margin-top: 5px;">Je vends mes services</small>
                        </label>
                    </div>
                </div>
                <button type="button" class="btn" onclick="nextStep(1)">Continuer</button>
            </div>

            <!-- Étape 2 : Informations spécifiques au créateur (cachée si acheteur) -->
            <div class="step" id="step2">
                <div id="creatorFields">
                    <div class="form-group">
                        <label for="company">Nom de l'entreprise / Nom commercial</label>
                        <input type="text" id="company" placeholder="Ex: Créations de Awa">
                    </div>
                    <div class="form-group">
                        <label for="category">Catégorie principale</label>
                        <select id="category">
                            <option value="">Sélectionnez une catégorie</option>
                            <!-- Les options seront chargées via JS -->
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="subcategory">Sous-catégorie / Spécialité (optionnel)</label>
                        <input type="text" id="subcategory" placeholder="Ex: Logo, illustration, etc.">
                    </div>
                    <div class="form-group">
                        <label for="description">Description de votre activité (optionnelle)</label>
                        <textarea id="description" placeholder="Décrivez brièvement ce que vous proposez..."></textarea>
                    </div>
                </div>
                <div style="display: flex; gap: 10px;">
                    <button type="button" class="btn btn-secondary" onclick="prevStep(2)">Retour</button>
                    <button type="button" class="btn" onclick="nextStep(2)">Continuer</button>
                </div>
            </div>

            <!-- Étape 3 : Informations personnelles (communes) -->
            <div class="step" id="step3">
                <div class="form-group">
                    <label for="fullname">Nom complet *</label>
                    <input type="text" id="fullname" placeholder="Votre nom" required>
                </div>
                <div class="form-group">
                    <label for="email">Email *</label>
                    <input type="email" id="email" placeholder="votre@email.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Mot de passe *</label>
                    <input type="password" id="password" placeholder="Au moins 8 caractères" required>
                    <div class="password-strength">
                        <div class="strength-bar" id="strengthBar"></div>
                    </div>
                    <div class="strength-text" id="strengthText"></div>
                </div>
                <div class="form-group">
                    <label for="confirmPassword">Confirmer le mot de passe *</label>
                    <input type="password" id="confirmPassword" placeholder="Confirmez" required>
                </div>
                <div class="form-group">
                    <label for="whatsapp">Numéro WhatsApp *</label>
                    <input type="tel" id="whatsapp" placeholder="+221 77 123 45 67" required>
                </div>
                <div class="form-group">
                    <label for="country">Pays *</label>
                    <select id="country" required>
                        <option value="">Sélectionnez votre pays</option>
                        <option value="SN">Sénégal</option>
                        <option value="CI">Côte d'Ivoire</option>
                        <option value="CM">Cameroun</option>
                        <option value="MA">Maroc</option>
                        <option value="TN">Tunisie</option>
                        <option value="DZ">Algérie</option>
                        <option value="BF">Burkina Faso</option>
                        <option value="ML">Mali</option>
                        <option value="NG">Nigéria</option>
                        <option value="ZA">Afrique du Sud</option>
                        <option value="KE">Kenya</option>
                        <option value="GH">Ghana</option>
                        <option value="CG">Congo</option>
                        <option value="CD">RDC</option>
                        <option value="BJ">Bénin</option>
                        <option value="TG">Togo</option>
                        <option value="NE">Niger</option>
                        <option value="MR">Mauritanie</option>
                        <option value="GW">Guinée-Bissau</option>
                        <option value="GN">Guinée</option>
                        <option value="SL">Sierra Leone</option>
                        <option value="LR">Liberia</option>
                        <option value="ET">Éthiopie</option>
                        <option value="UG">Ouganda</option>
                        <option value="RW">Rwanda</option>
                        <option value="BI">Burundi</option>
                        <option value="TZ">Tanzanie</option>
                        <option value="MG">Madagascar</option>
                        <option value="MU">Maurice</option>
                        <option value="KM">Comores</option>
                        <option value="CV">Cap-Vert</option>
                        <option value="ST">Sao Tomé-et-Principe</option>
                        <option value="GA">Gabon</option>
                        <option value="GQ">Guinée équatoriale</option>
                        <option value="TD">Tchad</option>
                        <option value="CF">République centrafricaine</option>
                        <option value="SS">Soudan du Sud</option>
                        <option value="ER">Érythrée</option>
                        <option value="DJ">Djibouti</option>
                        <option value="SO">Somalie</option>
                        <option value="SZ">Eswatini</option>
                        <option value="LS">Lesotho</option>
                        <option value="BW">Botswana</option>
                        <option value="NA">Namibie</option>
                        <option value="ZM">Zambie</option>
                        <option value="ZW">Zimbabwe</option>
                        <option value="MW">Malawi</option>
                        <option value="MZ">Mozambique</option>
                        <option value="AO">Angola</option>
                        <option value="LY">Libye</option>
                        <option value="SD">Soudan</option>
                        <option value="EG">Égypte</option>
                    </select>
                </div>
                <div style="display: flex; gap: 10px;">
                    <button type="button" class="btn btn-secondary" onclick="prevStep(3)">Retour</button>
                    <button type="button" class="btn" id="nextToStep4Btn" onclick="validateStep3()">Continuer</button>
                </div>
            </div>

            <!-- Étape 4 : Vérification d'email -->
            <div class="step" id="step4">
                <div class="verification-info" style="background: #e8f4fd; border-left: 4px solid var(--accent-blue); padding: 15px; border-radius: 5px; margin-bottom: 20px;">
                    <i class="fas fa-envelope" style="color: var(--accent-blue); margin-right: 10px;"></i>
                    Un email de vérification va être envoyé à l'adresse que vous avez fournie. Après vérification, vous pourrez vous connecter.
                </div>
                <div class="form-group">
                    <button type="submit" class="btn" id="submitBtn">Créer mon compte</button>
                </div>
                <div style="display: flex; gap: 10px;">
                    <button type="button" class="btn btn-secondary" onclick="prevStep(4)">Retour</button>
                </div>
            </div>
        </form>

        <div class="links">
            <p>Déjà un compte ? <a href="login.html">Connectez-vous</a></p>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script>
        // Configuration Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyAWlhXhkaOei9RzX8hCNcCXnpjWVId_s48",
            authDomain: "madil-be5be.firebaseapp.com",
            projectId: "madil-be5be",
            storageBucket: "madil-be5be.firebasestorage.app",
            messagingSenderId: "2892375937",
            appId: "1:2892375937:web:8d8381c7914cbd328aaa80",
            measurementId: "G-ZKXRFQDG93"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Liste des catégories (50+)
        const categories = [
            "Développement web", "Développement mobile", "Design graphique", "Illustration", "Logo design",
            "UI/UX design", "Motion design", "Montage vidéo", "Animation 2D/3D", "Photographie",
            "Rédaction web", "Copywriting", "Traduction", "Relecture", "Community management",
            "Marketing digital", "SEO", "Publicité en ligne", "Email marketing", "Influence",
            "Musique", "Composition", "Mixage audio", "Podcast", "Voix off",
            "Conseil", "Coaching", "Formation en ligne", "E-learning", "Création de contenu",
            "Gestion de projet", "Assistanat virtuel", "Saisie de données", "Transcription", "Recherche",
            "Architecture", "Ingénierie", "Comptabilité", "Juridique", "Traductions techniques",
            "Jeux vidéo", "Réalité virtuelle", "Intelligence artificielle", "Blockchain", "Cybersécurité",
            "Réseaux", "Support technique", "Administration système", "Cloud computing", "Data science"
        ];

        // Remplir la liste déroulante des catégories
        const categorySelect = document.getElementById('category');
        categories.forEach(cat => {
            const option = document.createElement('option');
            option.value = cat;
            option.textContent = cat;
            categorySelect.appendChild(option);
        });

        // Gestion des étapes
        let currentStep = 1;
        const steps = document.querySelectorAll('.step');
        const progressSteps = document.querySelectorAll('.progress-step');

        function showStep(step) {
            steps.forEach(s => s.classList.remove('active-step'));
            document.getElementById(`step${step}`).classList.add('active-step');
            progressSteps.forEach((ps, index) => {
                ps.classList.remove('active', 'completed');
                if (index + 1 === step) ps.classList.add('active');
                else if (index + 1 < step) ps.classList.add('completed');
            });
        }

        function nextStep(current) {
            if (current === 1) {
                const role = document.querySelector('input[name="role"]:checked').value;
                if (role === 'buyer') {
                    currentStep = 3;
                } else {
                    currentStep = 2;
                }
            } else if (current === 2) {
                // Champs créateur optionnels, on passe
                currentStep = 3;
            }
            showStep(currentStep);
        }

        function prevStep(current) {
            if (current === 2) {
                currentStep = 1;
            } else if (current === 3) {
                const role = document.querySelector('input[name="role"]:checked').value;
                if (role === 'creator') {
                    currentStep = 2;
                } else {
                    currentStep = 1;
                }
            } else if (current === 4) {
                currentStep = 3;
            }
            showStep(currentStep);
        }

        // Validation étape 3
        function validateStep3() {
            const fullname = document.getElementById('fullname').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const whatsapp = document.getElementById('whatsapp').value.trim();
            const country = document.getElementById('country').value;

            // Vérification des champs obligatoires
            if (!fullname || !email || !password || !confirmPassword || !whatsapp || !country) {
                showToast('Veuillez remplir tous les champs obligatoires.', 'error');
                return;
            }

            // Validation email simple
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                showToast('Adresse email invalide.', 'error');
                return;
            }

            // Validation mot de passe (8 caractères, majuscule, chiffre, spécial optionnel)
            const passwordRegex = /^(?=.*[A-Z])(?=.*\d).{8,}$/;
            if (!passwordRegex.test(password)) {
                showToast('Le mot de passe doit contenir au moins 8 caractères, une majuscule et un chiffre.', 'error');
                return;
            }

            if (password !== confirmPassword) {
                showToast('Les mots de passe ne correspondent pas.', 'error');
                return;
            }

            // Validation whatsapp (simple)
            if (whatsapp.length < 8) {
                showToast('Numéro WhatsApp invalide.', 'error');
                return;
            }

            // Tout est bon, passer à l'étape 4
            currentStep = 4;
            showStep(currentStep);
        }

        // Indicateur de force du mot de passe
        const passwordInput = document.getElementById('password');
        const strengthBar = document.getElementById('strengthBar');
        const strengthText = document.getElementById('strengthText');

        passwordInput.addEventListener('input', function() {
            const pwd = this.value;
            let strength = 0;
            if (pwd.length >= 8) strength++;
            if (/[A-Z]/.test(pwd)) strength++;
            if (/[0-9]/.test(pwd)) strength++;
            if (/[^A-Za-z0-9]/.test(pwd)) strength++; // caractère spécial

            let percent = (strength / 4) * 100;
            strengthBar.style.width = percent + '%';
            if (strength <= 1) {
                strengthBar.style.background = 'var(--danger)';
                strengthText.textContent = 'Faible';
                strengthText.className = 'strength-text weak';
            } else if (strength === 2) {
                strengthBar.style.background = 'var(--warning)';
                strengthText.textContent = 'Moyen';
                strengthText.className = 'strength-text medium';
            } else if (strength === 3) {
                strengthBar.style.background = 'var(--success)';
                strengthText.textContent = 'Bon';
                strengthText.className = 'strength-text strong';
            } else {
                strengthBar.style.background = 'var(--success)';
                strengthText.textContent = 'Très fort';
                strengthText.className = 'strength-text strong';
            }
        });

        // Mise en évidence du rôle sélectionné
        const roleBuyer = document.getElementById('roleBuyer');
        const roleCreator = document.getElementById('roleCreator');
        const roleBuyerLabel = document.getElementById('roleBuyerLabel');
        const roleCreatorLabel = document.getElementById('roleCreatorLabel');

        function updateRoleStyle() {
            if (roleBuyer.checked) {
                roleBuyerLabel.style.borderColor = '#FF6B35';
                roleCreatorLabel.style.borderColor = '#E2E8F0';
            } else {
                roleCreatorLabel.style.borderColor = '#FF6B35';
                roleBuyerLabel.style.borderColor = '#E2E8F0';
            }
        }
        roleBuyer.addEventListener('change', updateRoleStyle);
        roleCreator.addEventListener('change', updateRoleStyle);
        updateRoleStyle();

        // Toast notification
        function showToast(message, type = 'info') {
            const toast = document.getElementById('toast');
            toast.textContent = message; // simple, mais on peut améliorer avec icône
            toast.className = `toast ${type} show`;
            // Ajouter une icône selon type
            if (type === 'success') toast.innerHTML = '<i class="fas fa-check-circle"></i> ' + message;
            else if (type === 'error') toast.innerHTML = '<i class="fas fa-exclamation-circle"></i> ' + message;
            else if (type === 'warning') toast.innerHTML = '<i class="fas fa-exclamation-triangle"></i> ' + message;
            else toast.innerHTML = '<i class="fas fa-info-circle"></i> ' + message;
            setTimeout(() => {
                toast.classList.remove('show');
            }, 5000);
        }

        // Soumission finale
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Création en cours...';

            // Récupération des données
            const role = document.querySelector('input[name="role"]:checked').value;
            const fullname = document.getElementById('fullname').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const whatsapp = document.getElementById('whatsapp').value.trim();
            const country = document.getElementById('country').value;

            let additionalData = {
                name: fullname,
                email: email,
                whatsapp: whatsapp,
                country: country,
                role: role,
                emailVerified: false, // en attente de vérification
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            };

            if (role === 'creator') {
                additionalData.company = document.getElementById('company').value || '';
                additionalData.category = document.getElementById('category').value || '';
                additionalData.subcategory = document.getElementById('subcategory').value || '';
                additionalData.description = document.getElementById('description').value || '';
            }

            try {
                // Création de l'utilisateur dans Firebase Auth
                const userCredential = await auth.createUserWithEmailAndPassword(email, password);
                const user = userCredential.user;

                // Envoi de l'email de vérification
                await user.sendEmailVerification();

                // Stockage des données dans Firestore avec emailVerified: false
                await db.collection('users').doc(user.uid).set(additionalData);

                showToast('Compte créé avec succès ! Un email de vérification vous a été envoyé. Veuillez vérifier votre boîte mail.', 'success');

                // Redirection vers login après 5 secondes
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 5000);
            } catch (error) {
                console.error(error);
                showToast(error.message, 'error');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Créer mon compte';
            }
        });

        // Initialisation
        showStep(1);
    </script>
</body>
</html>
