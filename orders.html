<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Mes achats - AfrikDigitalo</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .order-card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: var(--shadow-sm);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .order-info h3 {
            margin-bottom: 5px;
            color: var(--secondary);
        }
        .order-meta {
            display: flex;
            gap: 20px;
            color: #777;
        }
        .order-status {
            font-weight: 600;
        }
    </style>
</head>
<body>
    <header class="main-header">
        <div class="logo">
            <img src="https://raw.githubusercontent.com/exaucenapopolo/AfrikDigitalo/refs/heads/main/Photo/ezgif-693a681e148aad8a.gif" alt="AfrikDigitalo">
            <span>Afrik<span class="highlight">Digitalo</span></span>
        </div>
        <div class="header-user">
            <button class="header-icon-btn" onclick="location.href='settings.html'"><i class="fas fa-cog"></i></button>
            <img id="headerAvatar" src="https://randomuser.me/api/portraits/lego/1.jpg" alt="Avatar" onclick="location.href='profile.html'">
        </div>
    </header>

    <div class="dashboard">
        <aside class="sidebar"></aside>
        <main class="main-content">
            <h2>Mes achats</h2>
            <div id="ordersList">Chargement...</div>

            <!-- Suggestions de produits similaires -->
            <div style="margin-top: 40px;">
                <h3>Vous pourriez aussi aimer</h3>
                <div id="suggestions" class="services-grid">Chargement...</div>
            </div>
        </main>
    </div>

    <nav class="mobile-nav" id="mobileNav">
        <ul id="mobileNavList"></ul>
    </nav>

    <div class="modal" id="logoutModal">
        <div class="modal-content">
            <span class="modal-close" onclick="closeLogoutModal()">&times;</span>
            <h3>Confirmation</h3>
            <p>Êtes-vous sûr de vouloir vous déconnecter ?</p>
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button class="btn btn-primary" id="confirmLogout">Oui</button>
                <button class="btn btn-secondary" onclick="closeLogoutModal()">Non</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            await requireAuth();
            if (!userData) return;

            if (userData.role !== 'buyer') {
                window.location.href = 'creator-dashboard.html';
                return;
            }

            const sections = [
                { id: 'dashboard', url: 'dashboard.html', icon: 'fas fa-home', label: 'Accueil' },
                { id: 'explore', url: 'explore.html', icon: 'fas fa-search', label: 'Explorer' },
                { id: 'cart', url: 'cart.html', icon: 'fas fa-shopping-cart', label: 'Panier' },
                { id: 'orders', url: 'orders.html', icon: 'fas fa-history', label: 'Mes achats' },
                { id: 'favorites', url: 'favorites.html', icon: 'fas fa-heart', label: 'Favoris' }
            ];
            document.getElementById('mobileNavList').innerHTML = sections.map(s => `
                <li><a href="${s.url}" class="${s.id === 'orders' ? 'active' : ''}"><i class="${s.icon}"></i> <span>${s.label}</span></a></li>
            `).join('');

            await loadOrders();
            await loadSuggestions();
        });

        async function loadOrders() {
            const listDiv = document.getElementById('ordersList');
            const orders = await db.collection('orders')
                .where('buyerId', '==', currentUser.uid)
                .orderBy('createdAt', 'desc')
                .get();

            if (orders.empty) {
                listDiv.innerHTML = '<p>Aucune commande.</p>';
                return;
            }

            let html = '';
            for (const doc of orders.docs) {
                const o = doc.data();
                const serviceDoc = await db.collection('services').doc(o.serviceId).get();
                const serviceTitle = serviceDoc.exists ? serviceDoc.data().title : 'Service inconnu';
                const date = o.createdAt ? new Date(o.createdAt.toDate()).toLocaleDateString() : 'N/A';
                const statusClass = o.status === 'completed' ? 'success' : o.status === 'pending' ? 'warning' : 'danger';
                html += `
                    <div class="order-card">
                        <div class="order-info">
                            <h3>${serviceTitle}</h3>
                            <div class="order-meta">
                                <span><i class="fas fa-calendar"></i> ${date}</span>
                                <span><i class="fas fa-tag"></i> ${o.amount} FCFA</span>
                            </div>
                        </div>
                        <div>
                            <span class="badge ${statusClass}">${o.status}</span>
                        </div>
                    </div>
                `;
            }
            listDiv.innerHTML = html;
        }

        async function loadSuggestions() {
            // Récupérer les catégories des achats de l'utilisateur
            const orders = await db.collection('orders').where('buyerId', '==', currentUser.uid).get();
            const categories = new Set();
            for (const doc of orders.docs) {
                const o = doc.data();
                const serviceDoc = await db.collection('services').doc(o.serviceId).get();
                if (serviceDoc.exists) {
                    categories.add(serviceDoc.data().category);
                }
            }

            if (categories.size === 0) {
                document.getElementById('suggestions').innerHTML = '<p>Explorez d\'autres services</p>';
                return;
            }

            // Chercher des services dans ces catégories, sauf ceux déjà achetés
            const services = await db.collection('services').where('category', 'in', Array.from(categories)).limit(4).get();
            let html = '';
            services.forEach(doc => {
                const s = doc.data();
                html += `
                    <div class="service-card">
                        ${s.images && s.images[0] ? `<img src="${s.images[0]}" style="width:100%; height:150px; object-fit:cover;">` : ''}
                        <h3>${s.title}</h3>
                        <p>${s.description.substring(0,60)}...</p>
                        <div class="service-price">${s.price} FCFA</div>
                        <button class="btn btn-success" onclick="addToCart('${doc.id}')">Ajouter au panier</button>
                    </div>
                `;
            });
            document.getElementById('suggestions').innerHTML = html || '<p>Découvrez de nouveaux services</p>';
        }

        window.addToCart = async function(serviceId) {
            const existing = await db.collection('cart').where('userId', '==', currentUser.uid).where('serviceId', '==', serviceId).get();
            if (!existing.empty) {
                showToast('Déjà dans le panier', 'info');
                return;
            }
            await db.collection('cart').add({
                userId: currentUser.uid,
                serviceId: serviceId,
                quantity: 1,
                addedAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            showToast('Ajouté au panier', 'success');
        };
    </script>
</body>
</html>
