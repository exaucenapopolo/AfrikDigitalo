<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Commandes - AfrikDigitalo</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="main-header">
        <div class="logo">
            <i class="fas fa-globe-africa"></i>
            <span>Afrik<span class="highlight">Digitalo</span></span>
        </div>
        <div class="header-user">
            <span id="headerUserName">Utilisateur</span>
            <img id="headerAvatar" src="https://randomuser.me/api/portraits/lego/1.jpg" alt="Avatar">
            <button class="btn-logout" id="logoutBtn"><i class="fas fa-sign-out-alt"></i></button>
        </div>
    </header>

    <button class="mobile-menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>

    <div class="dashboard">
        <aside class="sidebar" id="sidebar">
            <nav>
                <ul id="sidebarNav"></ul>
            </nav>
        </aside>

        <main class="main-content" id="mainContent">
            <div id="verificationBanner" class="verification-banner" style="display: none;">
                <p><i class="fas fa-exclamation-triangle"></i> Votre adresse email n'est pas encore vérifiée.</p>
                <button id="resendVerificationBtn">Renvoyer l'email</button>
            </div>

            <div id="ordersList">Chargement...</div>
        </main>
    </div>

    <nav class="mobile-nav" id="mobileNav">
        <ul id="mobileNavList"></ul>
    </nav>

    <div class="modal" id="logoutModal">
        <div class="modal-content">
            <span class="modal-close" onclick="closeLogoutModal()">&times;</span>
            <h3>Confirmation</h3>
            <p>Êtes-vous sûr de vouloir vous déconnecter ?</p>
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button class="btn btn-primary" id="confirmLogout">Oui</button>
                <button class="btn btn-secondary" onclick="closeLogoutModal()">Non</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            await requireAuth();
            if (!userData) return;

            const sections = userData.role === 'creator' ? [
                { id: 'dashboard', url: 'dashboard.html', icon: 'fas fa-home', label: 'Accueil' },
                { id: 'services', url: 'services.html', icon: 'fas fa-list', label: 'Mes services' },
                { id: 'orders', url: 'orders.html', icon: 'fas fa-shopping-bag', label: 'Commandes' },
                { id: 'followers', url: 'followers.html', icon: 'fas fa-users', label: 'Abonnés' },
                { id: 'profile', url: 'profile.html', icon: 'fas fa-user', label: 'Profil' },
                { id: 'settings', url: 'settings.html', icon: 'fas fa-cog', label: 'Paramètres' }
            ] : [
                { id: 'dashboard', url: 'dashboard.html', icon: 'fas fa-home', label: 'Accueil' },
                { id: 'explore', url: 'explore.html', icon: 'fas fa-search', label: 'Explorer' },
                { id: 'cart', url: 'cart.html', icon: 'fas fa-shopping-cart', label: 'Panier' },
                { id: 'orders', url: 'orders.html', icon: 'fas fa-history', label: 'Mes achats' },
                { id: 'favorites', url: 'favorites.html', icon: 'fas fa-heart', label: 'Favoris' },
                { id: 'profile', url: 'profile.html', icon: 'fas fa-user', label: 'Profil' },
                { id: 'settings', url: 'settings.html', icon: 'fas fa-cog', label: 'Paramètres' }
            ];
            document.getElementById('sidebarNav').innerHTML = sections.map(s => `
                <li><a href="${s.url}" class="${s.id === 'orders' ? 'active' : ''}"><i class="${s.icon}"></i> ${s.label}</a></li>
            `).join('');
            document.getElementById('mobileNavList').innerHTML = sections.map(s => `
                <li><a href="${s.url}" class="${s.id === 'orders' ? 'active' : ''}"><i class="${s.icon}"></i> <span>${s.label}</span></a></li>
            `).join('');

            await loadOrders();
        });

        async function loadOrders() {
            const listDiv = document.getElementById('ordersList');
            let orders;
            if (userData.role === 'creator') {
                orders = await db.collection('orders').where('sellerId', '==', currentUser.uid).orderBy('createdAt', 'desc').get();
            } else {
                orders = await db.collection('orders').where('buyerId', '==', currentUser.uid).orderBy('createdAt', 'desc').get();
            }
            if (orders.empty) {
                listDiv.innerHTML = '<p>Aucune commande.</p>';
                return;
            }
            let html = '<div class="orders-table"><h2>Commandes</h2><table><thead><tr><th>ID</th><th>Service</th><th>Montant</th><th>Statut</th><th>Date</th></tr></thead><tbody>';
            orders.forEach(doc => {
                const o = doc.data();
                const date = o.createdAt ? new Date(o.createdAt.toDate()).toLocaleDateString() : 'N/A';
                html += `<tr>
                    <td>${doc.id.slice(0, 6)}...</td>
                    <td>${o.serviceId}</td>
                    <td>${o.amount} FCFA</td>
                    <td><span class="badge ${o.status === 'completed' ? 'success' : o.status === 'pending' ? 'warning' : 'danger'}">${o.status}</span></td>
                    <td>${date}</td>
                </tr>`;
            });
            html += '</tbody></table></div>';
            listDiv.innerHTML = html;
        }
    </script>
</body>
</html>
