<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Favoris - AfrikDigitalo</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="main-header">
        <div class="logo">
            <img src="https://raw.githubusercontent.com/exaucenapopolo/AfrikDigitalo/refs/heads/main/Photo/ezgif-693a681e148aad8a.gif" alt="AfrikDigitalo">
            <span>Afrik<span class="highlight">Digitalo</span></span>
        </div>
        <div class="header-user">
            <button class="header-icon-btn" onclick="location.href='settings.html'"><i class="fas fa-cog"></i></button>
            <img id="headerAvatar" src="https://randomuser.me/api/portraits/lego/1.jpg" alt="Avatar" onclick="location.href='profile.html'">
        </div>
    </header>

    <div class="dashboard">
        <aside class="sidebar"></aside>
        <main class="main-content">
            <h2>Mes favoris</h2>
            <div id="favoritesList" class="services-grid">Chargement...</div>
        </main>
    </div>

    <nav class="mobile-nav" id="mobileNav">
        <ul id="mobileNavList"></ul>
    </nav>

    <div class="modal" id="logoutModal">
        <div class="modal-content">
            <span class="modal-close" onclick="closeLogoutModal()">&times;</span>
            <h3>Confirmation</h3>
            <p>Êtes-vous sûr de vouloir vous déconnecter ?</p>
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button class="btn btn-primary" id="confirmLogout">Oui</button>
                <button class="btn btn-secondary" onclick="closeLogoutModal()">Non</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            await requireAuth();
            if (!userData) return;

            if (userData.role !== 'buyer') {
                window.location.href = 'creator-dashboard.html';
                return;
            }

            const sections = [
                { id: 'dashboard', url: 'dashboard.html', icon: 'fas fa-home', label: 'Accueil' },
                { id: 'explore', url: 'explore.html', icon: 'fas fa-search', label: 'Explorer' },
                { id: 'cart', url: 'cart.html', icon: 'fas fa-shopping-cart', label: 'Panier' },
                { id: 'orders', url: 'orders.html', icon: 'fas fa-history', label: 'Mes achats' },
                { id: 'favorites', url: 'favorites.html', icon: 'fas fa-heart', label: 'Favoris' }
            ];
            document.getElementById('mobileNavList').innerHTML = sections.map(s => `
                <li><a href="${s.url}" class="${s.id === 'favorites' ? 'active' : ''}"><i class="${s.icon}"></i> <span>${s.label}</span></a></li>
            `).join('');

            await loadFavorites();
        });

        async function loadFavorites() {
            const listDiv = document.getElementById('favoritesList');
            const favSnap = await db.collection('favorites').where('userId', '==', currentUser.uid).get();
            if (favSnap.empty) {
                listDiv.innerHTML = '<p>Aucun favori.</p>';
                return;
            }
            let html = '';
            for (const doc of favSnap.docs) {
                const fav = doc.data();
                const serviceDoc = await db.collection('services').doc(fav.serviceId).get();
                if (serviceDoc.exists) {
                    const s = serviceDoc.data();
                    const imageHtml = s.images && s.images.length > 0 ? `<img src="${s.images[0]}" onclick="showImageModal('${s.images[0]}')">` : '';
                    html += `
                        <div class="service-card">
                            ${imageHtml}
                            <h3>${s.title}</h3>
                            <p>${s.description.substring(0, 60)}...</p>
                            <div class="service-price">${s.price} FCFA</div>
                            <div class="service-actions">
                                <button class="btn btn-success" onclick="addToCart('${fav.serviceId}')">Ajouter au panier</button>
                                <button class="btn btn-danger" onclick="confirmRemoveFavorite('${doc.id}')">Retirer</button>
                            </div>
                        </div>
                    `;
                }
            }
            listDiv.innerHTML = html;
        }

        window.addToCart = async function(serviceId) {
            const existing = await db.collection('cart').where('userId', '==', currentUser.uid).where('serviceId', '==', serviceId).get();
            if (!existing.empty) {
                showToast('Déjà dans le panier', 'info');
                return;
            }
            await db.collection('cart').add({
                userId: currentUser.uid,
                serviceId: serviceId,
                quantity: 1,
                addedAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            showToast('Ajouté au panier', 'success');
        };

        window.confirmRemoveFavorite = function(favId) {
            if (confirm('Retirer des favoris ?')) {
                removeFavorite(favId);
            }
        };

        window.removeFavorite = async function(favId) {
            await db.collection('favorites').doc(favId).delete();
            showToast('Retiré des favoris', 'success');
            loadFavorites();
        };
    </script>
</body>
</html>
